body:
  text: 第十八祖伽耶舍多章簷狗品第二十二尒時伽耶舍多者摩提國人也昔所生處於此國西三千之里有一大山名寶落迦其山南靣居于一足地廣平正父母舍宅而悉在中姓鬱頭藍號伽耶舍多父天蓋母字方聖而初孕時夜夢神人告方聖曰我來也手執寶鏡而就其母於此寤覺身躰安樂時出異香徧滿於室時時舍內每現圓光懷得七日而自誕育身如瑠璃內外明徹年甫十二都不洗浴其身清淨絕無塵垢時人共語悉不勝彼心常閑靜亦不多語處于舍宅亦不執怪尒時僧伽難提告大眾曰我昔本師羅睺羅多當受記云從吾之後於摩提國又出一師名伽耶舍多吾與汝等同尋此聖如此行已當會遇之尊者語訖與諸大眾至摩提國於法座上為眾演說忽於一日而有微風從西而起尊者迴靣向西而候其事已乃告大眾汝等諸人識此風不眾曰聖智非惻尊者曰今此風者名曰道風從此而去三千里內而有聖者欲出于𠀍先淨國土而生其風又告眾曰今此風者不同諸風亦名淨土風此風和涼不一切雖入大海不作諸浪雖入林木不動枝葉所有疾病遇此風者皆悉痊𨓤所有諸業懺不消者遇此風故皆悉除滅所有習學心不通者遇此風故心即朗暢而會其理尊者言已命大眾曰西尋聖者而化導之即作神通舉眾皆攝未至食頃到一大山山上有蓋如寶落迦尊者曰此是聖所聖亦止此言猶未訖見一俗舍𣏞于此山除此一舍更無他止是時尊者至彼舍宅云此蹔歇坐猶未久見一童子年當十二手抱銅鏡至于師所往返問荅具如上說父母見子有此竒異欲令出家遇尊者故方得度脫將至古寺登羅漢壇而為受戒師賜法藏并說其偈而教囑敬而奉行尒時伽耶舍多得付法已游行教化到一𠀍界名月氏國於彼國土大作佛事說法度眾導化無量又彼國中有婆羅門家養得一犬常於屋簷下臥縱蹔逐去還來本處如是臥此簷下經于十年不止別處人有所怪何好於此或復有雨并水所浸亦不離此臥於水中尒時婆羅門心自念言此犬何意而好處此更不餘止以杖驅逐蹔去還返如是打喝又經五年尒時婆羅門年始三十名曰鳩摩羅多心常勇健不信有佛亦不信法不信因緣及諸果報而信外道常師梵志談非因緣何有果報俱是自然梵志所說甘心信伏時鳩摩羅多告梵志曰師說自然非因緣法今此㺃者當何自然而處于此梵志曰此㺃其心自然而好低下亦非因緣之所感故尒時鳩摩羅多又告梵志曰我於昨夜而作一好夢夢見真金曰赫赫照天地我與梵志等處于一暗室忽被日光射二身如琉璃師身淨無物我身蟻眾食師說達自然而為我消釋尒時梵志告鳩摩羅多曰此日出自然赫赫自然赤真金躰自然非物能賤貴天地本自然光照於彼此二人處于室明暗各自然汝身蟻眾食我躰常自然尒時鳩摩羅多雖聞所解心猶未釋又曰我所作夢欲釋其原師所解夢還如說夢如此解已非我意中揔說於自然何如夢說夢又曰願逢一智者而為我解釋與彼事相應我願隨師學作是念已即捨梵志而歸本舍尒時伽耶舍多在彼國中於一座上告大眾曰見此氣不大眾曰見師曰教說此氣者大乘氣也何以夫氣像者氣如虹環其事必圓氣如玉璫菩在傍今此氣者猶如玉璫下有聖者不久出𠀍又云佛記云吾滅度後九百年中當有菩現月氏國後而化導至于北天復度一眾次第二十今此氣者必當是乎尒時伽耶舍多即下本座與諸大眾至于氣所到彼氣所其氣漸隱師即立住轉復不見師曰此聖非遠且候從容須之閒有婆羅門年甫三十來問左右曰此是何人左右報曰是佛弟子尒時婆羅門却歸本舍而閉其戶是時伽耶舍多告大眾曰前瑞所起不離此宅尊者進步漸至宅所而扣其戶尒時婆羅門報曰此舍無人尊者問曰荅無者誰時婆羅門鳩摩羅多聞其語異不同梵志必是智人而可屈就時鳩摩羅多即開其門禮覲尊者請於舍內而踞其塌以諸果藥而供養之是時尊者作是念言今此人者必當是矣時鳩摩羅多而供養已乃問師曰我家有一犬常於檐下濕地而臥前後打逐蹔去還返至於彼臥更不移止今請智者為說其事與意同故我即師學尊者曰若我所說定其昔事與汝意通實師我不鳩摩羅多若與意合當隨師學伽耶舍多曰今此犬者是汝父也何以故為有少業而墯㺃中其父死時汝身不在父有黃金未付於汝金在簷下以瓮盛之可有千鋌汝若不信但掘於此汝𠬧金後狗臥隨處不定於彼時鳩摩羅多即致其功便掘其地未至五尺掘著其瓮瓮有黃金實千餘鋌收拾以訖其犬不止隨其處所而自安臥時鳩摩羅多不違願故便隨師學又問昔夢具如前白尊者曰汝夢見日是佛日照曜天地者度二眾也二人處暗室者心未明了也日光照身者出無明宅也身如琉璃彼所淨者自利一身非度他眾汝身有蟻眾所知識而自湊泊當於彼所而食汝祿尒時鳩摩羅多聞說二事心即決定即離居舍隨師敬奉而為給侍尒時伽耶舍多深知宿命知此弟子道力當備而命聖眾而與出家受具足戒令證道果時伽耶舍多告鳩摩羅多曰如來以大法眼付囑迦葉如是展轉乃至於我我今傳此正法眼藏付囑於汝汝受吾教聽吾偈言有種有心地因緣能發萌於緣不能礙當生生不生尒時鳩摩羅多聞師說偈心生歡喜得法眼故當自安樂而受訓誨敬重頂戴尒時伽耶舍多付法已竟即從座起涌身虛空作十八變化火三昧自焚其身亦不至地雨下舍利眾拾供養隨收得處各塔廟而供養之時當此土前漢第十主成帝十四年戊申之歲入涅槃也第十九祖鳩摩羅多章試神足品第二十三尒時鳩摩羅多者月氏國人也姓婆羅門昔於無量刧中曾生他化自在天上忽見菩身有瓔珞心生愛羨次墯他化而生梵天與一天仙說佛知見彼仙證果獲須陁洹承此力故而為導師度諸天眾有一天女其皃端正多修忍辱而至此會禮覲導師時一座中人千二百俱瞻此女心起愛樂累彼導師墯於梵天而生此土彼天女者亦生此土而姓梵志尒時導師生婆羅門家其人財富多諸金銀七珍等寶心長𢜪惜人所難得尒時有一羅漢名曰海勝知彼導師昔之因緣當墯於此羅漢曰我於先𠀍曾生梵天因得此師說佛知見今者當證道果我既得果須化此師而令出𠀍作是念已即至婆羅門家見一童子名鳩摩羅多便問乞金汝若施我當獲解脫童子曰我年十五未至自由父雖不在待白其母童子白母母即聽施隨汝所與亦不留難是時童子施金一斤與彼羅漢羅漢記曰汝從向去又經一十五年當遇菩出𠀍而引入道化度無量盡獲聖果已授記畢羅漢又曰汝有小難而折大業不久解脫疾證菩提尒時羅漢言訖即去未至須其父歸舍子白前言猶未訖叫喚罵詈即取其杖決子一百從此決已父身病疾於夜分中密自執器於其簷下而掘其坑可深一丈埋其瓮金近一千鋌恐子抂用而破家業從此埋已不令大小而知處所唯自側臥瞻望簷下從此病已直至于死却於本舍而作一㺃唯臥簷下先問梵志而不能釋次遇伽耶舍多而悉往事前文已明不能再述尒時鳩摩羅多得付法已與諸大眾游歷他國化導眾生行菩道植諸善本名稱諸土時北天笁有一大士而塗足油歷諸國界而遇尊者作禮圍繞却住一靣而白其事我家有父母心常好供養亦求於佛道至樂禪寂者未知何因緣長疾而不効我有一隣舍心常行兇險煞害一切物不解求佛道亦不識供養豈會禪寂者如此行惡故常獲無病疾未知此二行惡者却善資善者却惡報伏願尊解說令我得見之尒時鳩摩羅多告大士曰佛云人生在𠀍有三等業吾悉知之何等為三亦曰三𠀍前生福業大而積功德厚當報於今身今身作諸罪惡業力微劣未及功德多且受善業報不現其惡相從此一報中更不作功德盡此一報畢當墯於惡道一入無有出更不復人道又曰前𠀍作惡業其罪如丘山今𠀍作少善猶未過於彼其善力微薄且受諸惡故不現其好相從此一報中更不作諸惡盡此一報畢當獲諸善報於此善報時更不作諸惡而不煞害故更不復惡道永永生善利又曰前生修功德而致彊半功有少破和故迴心修惡行罪業少功德亦死先受福正快活心似得安樂忽降諸凶𮕱其家漸殘破承彼先惡業相續致於此非是今修福而招此惡報又曰前𠀍作惡業其罪彊半功忽遇一智者而教修福德福德雖修已其善未過彼功德少於罪亦死先貧窮心不敬信佛亦不重三寶如是過半已其家漸富有資生多財帛承彼先善業相續致於此非是今作惡而招此善報尒時大士聞師說法心開意朗欲依師法如師出家師曰汝有父母當在何國而須就彼白言出家父母聽汝許可即來大士曰我去本國難可得迴從此至舍三千餘里我請尊者彼國供養度我出家尊者曰我徃彼土不足食頃汝所致步應難得至大士曰我往不難亦是食頃尊者曰汝有何法大士曰我在家時有一師兄名闍夜摩曾在彼國主一佛塔其塔中佛名俱那含於此塔前先有一樹樹生其子多不越百其大如棗名末訶子此佛滅度生此一樹其子為油將塗其足須之頃游三千里又欲住時將此樹葉隨身多少拭此油盡要住即住欲擬行又將塗足如是住法准如前事尊者曰汝有此油已非凡故共汝即同往彼國尒時鳩摩羅多即作神通而往比天竺國如是神力至彼佛塔作禮圍繞却住一面瞻仰尊顏目不蹔捨尒時俱那含佛放白豪光照彼大眾盡獲阿羅漢果各有神力而自在故尒時大士辭父母竟而至師所志求出家時鳩摩羅多尊者即於塔前度闍夜多復命聖眾而為受戒尒時鳩摩羅多度大士已用偈告曰此佛放光明是度於汝相汝已得解脫諸眾當亦然尊者說此偈已乃告闍夜多曰如來已大法眼付囑迦葉如是展轉乃至於我我今將此法藏付囑於汝汝當守護聽吾偈言性上本無生為對求人說於法既無得何懷決不決尊者說此偈已乃告眾曰今此偈者妙音如來見性之偈汝可禮重當獲覺路時闍夜多深心敬重依師教詔頂戴奉持時鳩摩羅多付法已竟即於座上以爪面各分兩向當此分處有大光明照諸大眾照大眾已寂然滅度諸眾感慟起塔供養時當此土王莽十八年壬午之歲入涅槃第二十祖闍夜多章示終神力品第二十四尒時闍夜多者北天笠國人也以兄油故用塗其足至彼中印度禮覲鳩摩羅多尊者問其業報善惡各異上修福德便有凶衰而作諸惡咸昭善瑞其此二者前文以錄故不說焉時鳩摩羅多而為說已大眾聞竟悉獲聖位尒時闍夜多聞師所說心意朗然即欲出家隨師侍衛尊者曰汝父母何處𦤇辭父母父母聽許即來吾所為汝出家闍夜多曰我之父母去此三千我去即易來曰無由以尊力故共至彼時尊者我去三千未消食須汝去歸國非得易耶闍夜多曰我之有兄而入佛道於彼國中供養一塔塔中有佛名拘那含此佛滅時當於塔前而生一樹彼樹有子如其棗大極結繁實方得百顆將得此子以充其油塗其足下須之頃行三千里不將難矣尊者告曰汝有此油是非凡者我今共汝同往彼國得覲佛塔瞻禮圍繞尒時鳩摩羅多即作神力而至佛塔見其塔已作禮瞻仰尒時拘那含佛從其頂相放大光明照燭一眾皆獲解脫闍夜多亦至彼所而求出家白尊者曰父母聽我而依尊者尒時鳩摩羅多便與度脫命諸羅漢而與受戒師見度已而說偈言此佛放光明是度於汝相汝已得解脫諸眾當亦然尊者付法并說法偈受其教囑頂戴奉行尒時闍夜多得付法已心得自在行菩道宣正妙法名徧諸國度眾無量佛授記云吾滅度後九百年中至于北天復度一眾次第二十名闍夜多佛記第二十祖智慧超勝辯才無礙游歷國土靡不周徧至一聚落名羅城彼城之中多諸道眾而見尊者咸皆宗仰彼諸眾等善解三藏甚深淵博辯惠聰慜諸有來者無能敵彼是時眾中有一頭陀六時禮佛少欲知足長坐不臥一食而已尒時尊者告大眾曰此頭陀者汝見如何諸大眾曰不可思議常修梵行長坐不臥一食而已尊者告眾曰此是道耶眾曰誠如尊說尊者曰今此頭陀不久墯落與道縣遠心有所得不名道故眾曰師如何尊曰我不求道亦不顛倒我不六禮亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲尒時頭陀聞說法已心生敬重即於座前以偈讚曰稽首三昧尊不求於佛道不禮亦不慢心不生顛倒不坐不懈怠但食無所好雖慢而不遲雖急而不躁我今遇寶尊和南依師教尒時尊者告大眾曰會吾語不大眾曰依教奉行尊曰此頭陀者非是汝背曾過去刧常行不輕行至于今日吾所言者為彼求道者心如彼緊絃曰贊曰此絃急故其聲斷焉此聲緊故行者絕矣故吾不贊令彼寬慢無有所得方始安樂此北天笠呼為徧行頭陀此羅城眾共號此徧行頭陀為婆修盤頭也是梵語矣尒時闍夜多尊者知此婆修盤頭是其法器雖遭逆語心不動搖轉生恭敬意如大海又問婆修盤頭曰汝生恭敬心不𨓤轉有此逆言當何不動尒時婆修盤頭白尊者曰我昔前𠀍第七刧中至行勤敬常樂供養於一國土名常安樂我於彼所心不懈怠常行教化見一智者名曰月淨乃命我住而語我言汝當不久證斯陀含果宜應勤敬勿可犯也又語我言至修行者如彼昇天漸漸而上去地遙遠不可退墯若𨓤墯者終有所而不復上我昔𠀍中年已八十復患腰腳不能自履以杖扶䇿隨其處所有一菩名大光明而處一寺居止一房我就致敬已畢却歸本座尒時月淨而來至彼當語我言前者見汝不久證果今度一覩却在凡地苦哉苦哉何因始此知汝其過輕父重子婆修盤頭問月淨曰此非可懺不月淨曰汝識罪不婆修盤頭曰我未省犯月淨曰汝懺何罪婆修盤頭曰我多忘失未省此罪月淨曰汝禮拜大光菩不婆修盤頭曰我曾禮拜汝省彼房門外有畫佛不婆修盤頭曰不見月淨曰汝倚其杖在其佛面為彼輕故不得斯陀含果當退八位汝須知之時婆修盤頭即至彼寺其壁上實有一佛為禮大光倚此杖故上墯於我而歸八位今見尊者所出言教無不信受縱有逆語如風度耳亦不停滯願尊慈造有法教誨時闍夜多告婆修盤頭曰如來已大法眼付囑迦葉如是展轉乃至於我我今將此法眼藏付囑於汝汝可流布無令斷絕受吾教已而聽偈言言下合無生同於法界性若能如是解通達事理竟時婆修盤頭聞說法及其偈言心生歡喜頂戴奉行尒時闍夜多付法已竟即於座上已首在下卓然倒立如娑羅樹枝舉眾共取欲擬闍維悉不能動又諸羅漢盡其神力欲擬取下亦不能動如須彌山不可傾覆尒時大眾同用神力有百千眾亦不能動時眾共集焚香白曰請師下本座我等欲闍維願師大慈故令我得舍利纔稽眾首而共向前忽然自倒如五大山崩地皆震動尒時大眾用已香薪而共闍維闍維既畢收得舍利起窣堵波共其供養時時瞻覲時當後漢第二主明帝十六年甲戌之嵗入涅槃也第二十一祖婆修盤頭章舉太子品第二十五尒時婆修盤頭者羅城人也姓毗舍佉父名光蓋母字嚴一家有財寶供給四方唯無其子光蓋曰我無子嗣當何求之嚴一日於彼城北有一佛廟共至所求必應得之是時光蓋而共嚴一至彼塔所合掌禮敬散諸花香徧於佛上又致供養而細嚴飾咸共尊仰而啟其願曰我於𠀍尊所而欲乞一子願尊大慈故不違我等願是時願已却至本舍於一夜中夢見二珠一珠光明而能徹耀又一珠故亦有光明其光如電有無不定前一珠者光明照耀亦不歇滅食二珠已尋即夢覺身躰恱澤無諸苦惱懷至七日當有一僧名曰賢眾至於門首而問之曰我行四國土尋光至於此汝彼是誰舍當生一賢子尒時光蓋長者聞是語已即出逢迎彼師見已心即歡喜尒時嚴一亦出禮拜賢眾見禮不敢當次云禮佛自禮法身福智尊者尒時光蓋作是思惟此僧非聖當鄙凡者我是丈夫禮却不起彼女人敬心即恐悚尒時光蓋却歸房室取一寶珠奉上賢眾以試其心又更作禮尒時賢眾端然不動亦不止遏受其寶已云汝好在令更作禮光蓋致禮近將百拜既見不止心自停息猶不會意云我見尊者受我寶珠心即歡喜復見尊者不受女人拜敬心自恐悚不敢安座其事云何請為宣說賢眾曰汝不問我我即不說受汝拜者汝是凡夫有少福德合遇於我我受汝珠以用資福當生之中而獲財利不令欠我受汝拜資得當生和合眷屬不令返逆彼女人者身懷菩是㝡上乘不久當世化度無量三昧果中亦得㝡上而當十五即應出家次遇毗婆訶而得受戒從此去已常行苦行曰食一中此國名曰徧行頭陀亦曰婆修盤頭當度賢者如我等輩約殑伽沙所以見者不敢輕𢢔非貴女人而致於此光蓋曰善哉大士而有他心於此三世悉能覩見讚禮而已深生敬重自責輕𢢔至悔前預而知其本又賢告曰汝有二子一者上說更不再言其第二者名曰芻尼芻尼者梵言也此曰野鵲此子者於先𠀍時𠀍尊入定在於雪山彼子為鵲泊於佛首又作一巢時來時去𠀍尊成道彼鵲為近佛故而獲此報𠀍尊出𠀍天龍八部游那提國彼國王者是此子也𠀍尊至彼王即出迎瞻奉隨從請尊至殿而設供養欲問往事以何因緣我名芻尼尒此過去經多少歲而親智者願尊慈造為我解說尒時𠀍尊告芻尼王曰汝先𠀍中曾作野鵲吾入定時汝於吾頂置一鳥巢或來或去已經六載吾已成佛汝作其王為近我故而獲此利於後五𠀍悉名芻尼吾滅度後二五百未當生羅城中毗舍佉家得與聖者婆修盤頭同處一胎而出于𠀍此婆修盤頭者是賢刧祖次二十一其師之後當出弟子有大神力十那羅延一切諸眾悉不能及以此力故號大力尊尒時芻尼王聞佛所說先𠀍為鵲心即驚悟以其瓔珞用嚴一蓋共成奉上𠀍尊伏賀先𠀍願尊慈造當為領納尒時𠀍尊作少神力即用此蓋而處其頂尊又告曰汝後五𠀍中為遇此菩當獲大神力而生忉利天尒時芻尼王聞佛說已心即歡喜合掌尊前以偈讚曰與聖同處胎當於第五𠀍為遇婆修故而得生忉利我昔為野鵲在尊頂上止奉此七寶蓋以荅先𠀍耳尒時婆修盤頭年當十五遇一尊者名曰光度而與出家後逢毗婆訶而與受戒至行頭陀心不退轉縱遇諸境生滅不起猶若須彌八風共吹至無量刧悉不能動尒時闍夜多知此婆修盤頭是其法器雖遭逆語心不動搖轉生敬重意如大海當付法偈而受教詔即往他土而行化之至那提國之南有其大象頻下物人不敢敵自三十年來其象不下一國人民皆得快活心不憂懼亦不耗彼由何故凡不可知願遇聖者而為我說彼城之眾咸悉安樂無有患故不作惡夢彼國有王名常自在有二太子一名摩訶羅二名摩拏羅此初太子年已四十其第二者年已三十常得安樂不被諸境之所惑亂每至園觀心自念言聖者合至何當晚乎尒時婆修盤頭至此國已大作佛事廣為說法化諸道眾皆蒙獲益時彼王者忽聞此師即令使者而請供養尒時婆修盤頭至王宮殿王即禮敬心生瞻慕即命二子令致敬師用資福業王白師曰師在他國見彼人眾得似此不婆修盤頭曰諸國土中業感不等為取何國而況此之王曰師羅城何如此土師曰彼國曾有三佛出𠀍此土即有二師化導以其父子而況得之王曰今此國中未有佛出大眾安樂猶何善耶王曰若佛出𠀍王非在此承此二師故有此善瑞王曰二師者誰師曰佛記云吾滅度後二五百末那提國王𠛴利多滿名常自在生二太子其第二者有大神力一切諸眾悉不敢敵其力一舉昇十那羅延八地四眾悉不能及從此因故號摩拏羅王今太子即當其事王曰其次者誰師曰吾亦預此王即致敬心生歡喜未至食頃有一使者奏曰象兵百萬至于南面欲近城門漸漸而進王曰此事非小如何抵師曰不用軍眾亦不須刃令此太子輕喝一聲悉不能動何用憂慮王曰得不師曰今此太子非百萬象更有十倍亦不可王即命太子令至城南象兵漸至彊過百萬尒時太子即舉右手拍其腹上而喝一聲其那提國中所有宮殿及諸舍屋悉皆振動象兵百萬悉在于地不復更起尒時大王見子勝已深生敬伏不敢輕𢢔而禮尊者曰我此子者佛已授記生于此國為大沙門而有其力昇十那羅延伏願尊者而與出家依佛記故勿令違犯尊者曰今此太子非我出家復至他日無人度者尒時尊者婆修盤頭即就王宮命語聖眾而與太子出家受戒尒時太子得度脫已心生恭敬即於尊前以偈讚曰為摧百萬象鼓腹作神通一切諸宮殿無不振動者遇師方便力而得度脫我稽首辭父母而出於愛火尒時尊者即領太子摩拏比丘聚落行化乃告王曰我為此太子而至于那提今已得解脫冝令化導之尒時那提國王常自在等與諸眷屬共送此子而至分首隨緣往所是時婆修盤頭在彼國中游行教化建勝法幢辯才無礙摧諸邪見而歸降伏隨彼化導百千萬眾悉得度脫而證聖果乃命弟子摩拏羅曰如來以大法眼付囑迦葉如是展轉乃至於我我今將此正法眼藏付囑於汝汝受吾教聽吾偈言泡幻同無礙如何不了悟達法在其中非今亦非古尒時摩拏羅聞說法偈心即歡喜而生恭敬頂戴奉行時婆修盤頭付法已竟即於座上高半由旬其身在空亦不神變凝然而住尒時大眾咸共合掌而啟告曰至尊大慈故令我得舍利莫現是神變願師歸本止時諸大眾作是語已䬃然從空却還本座便焚舍利起塔供養時當此土後漢苐五主殤帝九年丁巳之歲入涅槃也第二十二祖摩拏羅章伏術師品第二十六尒時摩拏羅者那提國人也姓𠛴利帝亦名大力尊有云摩奴羅者此非理也昔在國時身為太子父名多滿亦名常自在佛記云吾滅度後二五百末那提國王𠛴利多滿亦名常自在生二太子其第二者有大神力一切諸眾悉不敢敵其力一舉昇十那羅延八地四眾悉不能及從此因故號摩拏羅佛已授記其實如之尒時婆修盤頭者得五神通及八解脫隨彼國王而行化之以大福力多所饒益次至一國土名曰那提彼國𠛴利王而生二太子其次第二者而有大威力彼國多象眾而頻侵聚落自生太子來其象並不國土無𮕱惱以經三十年尊者婆修至化導無量眾受王請供養到彼宮殿已命出二太子令禮婆修尊欲求於福報尒時大王問尊者曰師在他土見彼人眾得似此不尒時婆修盤頭對曰諸國土中業感不等為取何國而況此之王曰師羅城何如此土師曰彼國曾有三佛出𠀍此土即有二師化導以其父子而況得之王曰今此國中未有佛出大眾安樂由何善耶師曰若佛出𠀍王非在此承二師故有此善瑞王曰二師者誰師曰第一者是吾第二者太子此國無患得三十年今此太子亦年三十此事現在非無信耶師曰此太子者身有大力能摧諸魔心有智力能伏生死王曰如何得知師曰不久之須當有一信從南而來以此事故而顯太子師與王語言猶未畢忽見一人而至殿前奏曰今此城南有百萬象兵而入國界王聞此事心生憂惱以何兵眾而戰得勝尊者曰今此事者而亦易為王有太子其力難比令此太子而敵得之王曰此事非小如何抵敵師曰不用軍眾亦不須刃惟此太子輕喝一聲悉不能動何懷憂慮王曰得不師曰今此太子非百萬象更有十倍亦不怯弱王曰令命太子戰彼象兵尒時太子奉王勑詔命戰象兵即至城南端然而立其象兵眾漸漸而進尒時太子即已右手拍其腹上此象眾等悉皆崩倒更不復起試喝一聲六返振動父王見已深自歎訝此子出世非我等輩佛已授記云生彼國因師證故而得知之又曰我有二子其一敢異若紹我位必應勝之師曰此子在舍非登此位若作主者為銀輪王王三天下非此小國而及用之又曰若出家時定作法祖而繼於我化導九眾尒時大王見子勝己深生敬伏不敢輕慢而禮尊者曰我此太子佛已授記生于此國為大沙門而有其力昇十那羅延伏願尊者而與出家依佛語故勿令違負尊者曰今此太子非我出家復至他日無能度者尒時尊者即就王舍而與出家又命聖眾并受具戒尒時摩拏羅得度脫已心生歡喜瞻仰尊顏目不蹔捨尒時婆修盤頭即領摩拏羅欲化道眾故辝王曰我欲化導眾隨所諸聚落願捨摩拏羅而隨於我去王曰師與出家竟即是師弟子非我等拘束聽從隨師化度尒時婆修盤頭當行化時度諸有眾而滿三萬得聖果者近自五千而化度已告摩拏羅曰如來以大法眼付囑迦葉如是展轉乃至于我我持此法付囑於汝汝可流布無令斷絕并傳法偈具在前文而不再說婆修示化終于本緣尒時摩挐羅得付法已心得自在隨化他土諸有眾而為說法次第游行至于一國名西印度彼國國王於宮菀中常自行道名曰得度姓于瞿曇手執金蓮如供養佛於菀空地并自閑靜唯置一爐常焚寶香而呪願曰願我遇聖而得了知前後際中一切諸境王發願已而又行道如是行道經于七年當於行處而現一塔亦不高廣至甚低小從座至頂一尺四寸其色青黑四面有相各自而異前一面者有尸毗王割股救鴿又左一面者有其埵投于險崖復右面上有月光王而捨寶首當後一面有慈力王剜身千燈尒時大王行道已竟忽見一塔至是低小極而高廣未過二尺以手欲捧都不能動又令淨者而有二人共舉此塔亦不能動又命五人依前所舉亦不能動尒時大王既見如此廣命多眾可滿一百悉有其力共舉此塔亦不能動尒時大王當自念言此塔至小亦不連地何故多眾悉不能動王就塔所而致供養焚香𢿱花徧滿其處即命國內諸有智者咸共詳察尒時摩拏羅尊者在此會中亦不先說讓諸智者而為其首一會大眾而有五百王致供養而設眾僧彼國僧眾多修梵行復有一眾而修禪觀自有一等而善術誓彼三眾等悉赴王會時眾食已王白前事問諸智者今此菀中我常行道於此淨地而湧一塔未至高廣人不能動我欲將彼就此宮殿置於高處而供養之一眾智者誰能為我移得此塔就其宮殿是時會中有一智者善明呪誓白大王曰我當移得王曰便請尊者尒時術師即於王舍請一大物眾不能舉我且試之然移此塔王曰我有殿前銀山高廣極重今此力士非論一百二百三四五百悉不能出此山入地深至水際昔時鑄作將鎮此殿師有力故一任出之尒時術者即作其法以手結印用按于地即舉左手而曲其肱高聲喝咄未至食頃其山漸動舉眾皆見䬃然而出三眾歡喜無不欣訝王見是已其心豁然讚言善哉壯哉其力如此何憂移塔尒時術師即至塔所見塔小心不敬重又曰此是小小何足其力王曰便命術者而為移塔尒時術師即就塔邊以手欲舉其塔安然都不能動術師却後七步便作前法先喝一聲牙齒墯落其術師自不覺知又喝一聲眉毛亦落其此術者上未覺知又喝一聲其鼻崩倒時諸大眾喚言且住術師即走東西南北又不遠去只在眾前大眾又喚術師術師且來此座何用亂走術師𠮧曰諸人等復在何處而不出來救我之命三眾共起向前捉之悉捉不住尒時大王既見是已即命五百力士令捉術師如捉得住當厚與賞是時力士同共向前便擬把捉悉被衝到亦不可近其身如鐵把亦不住尒時大王告大眾曰今此眾中誰能誡此我見此事何由可當雖有身力亦不敢為是彼自顛倒為是聖者所作為是法合如此為是自失心力彼眾之中誰有諳者當為我誡令免任亂我所敬信亦不害此當願依舊如前無異三物曰若人以上缺一紙兩行下原殘脫皆為此具七事者前際後際悉能刧中亦如眼見他心宿命從此而通八解三明皆因始發欲近佛地方獲菩提踏著六通便成羅漢是時王聞深生信重問尊者曰師久修行善知宿命又知奇事明前後際未審此塔當是何佛我欲知識今請尊者而為說之尊者曰今此一會眾賢非一願王見念當迴問彼尒時大王即從座起整頓衣服而請諸眾曰願諸眾等哀念我等有他心者而知昔事今此塔者當是何佛是何弟子而造此塔為是何物之所成就伏願眾聖而為解說尒時大眾一時起立合掌白王我等三眾非見彼事願王迴信當請摩拏尊者必當為說又此摩拏尊者昔為太子時能戰百萬象佛已曾記之次當二十二想此往勝事今覩非凡者願善哀請故而當說之尒時大王却至尊所而白前事具如上陳時摩拏羅曰此眾諸聖咸悉知之故讓於我而令為說又曰今此塔者是我本師釋迦如來七寶舍利塔也何以故尒時如來在王舍城東游行教化之次時有一童子年已七歲名曰舍耶是時童子在河弄沙見𠀍尊過手執金鉢入王舍城時此童子即以此沙如其餅想將奉𠀍尊尒時𠀍尊以鉢受之為尊感故化為金粟將供一眾而悉充足為獲此報而作輪王化一天下能使鬼眾悉伏宗仰即時童子身為輪王心多暴燥虐殘劣少少信故違犯多殺自此童子生於宮時有一大樹其葉鮮澤婆娑陰茷上有其子時放光明人至於下心即安樂其樹初生時與此太子同時而出太子登位年已四十時與音樂一切御眾每至於樹在此樹下王即安樂若離此樹心不悅澤其本性中常好㱃酒一度酒酔常御眾三十五十所有行事皆天地又作大地獄一十八所還像陰道如是行法乖治國土又於一日領諸嬪妃一千餘眾同至樹下以酒㱃樂直至過度王便寢臥未至須有大風至王亦不知其風樹花果墜地良久之頃其風靜已王便睡覺酒醉作怒云我蹔睡便其樹此過難捨而當殺之如是眾又經千百前後共不知其數彼鐵輪國亦有一僧名曰耶舍亦是菩而有六通王雖知有不至深信又有一僧名曰海意見王眾而滿八萬海意念曰今此王者前𠀍舍耶遇我𠀍尊而施沙故因此果報而獲王身若不救之當墯蠅虻無有出期又曰此八萬眾而復抂死悉未得生為王福盛不可取之更待三白當必死矣尒時海意即作神通入彼地獄法者曰沙門何故而至於此海意曰我欲入鑊湯如何庇護法者曰此鑊湯中而無冷處幸不入得尊者曰我有少病而欲入之法者曰此湯若入骨肉俱盡斷其根本非除病也尊者曰我為無明顛倒皆由此病若得除本何由可論又曰我為抂殺一切眾生今當合償前後計眾近有八萬為㱃酒故而悮殺之當獲是報皆是我過非因汝事而但放我令入鑊湯若得盡我惡業汝亦利故法者曰我於師天之不祐為無罪故非是過者若欲入鑊待我奏王取王進止尊者曰然法者修表以說前事奏上大王王聞大怒此妙門者當譏於我我不誅之受彼鈍故即令處置何在於晚尒時法者而奉敕旨依法處置令入鑊湯尒時海意被拋鑊中其沸波湧不可近處尒時海意從鑊中心涌出蓮花高七多羅樹端然處𢉰亦不故法者奏曰奉敕處置比丘海意拋在鑊中都無有又乘一花從鑊而舉高七多羅樹端然不動見在法所伏聽敕裁尒時大王聞說前事即與御眾同徃觀之纔至彼所王一見已便致禮信廣發大願而懺謝之尒時海意便被王請與耶舍比丘同止一寺時時禮覲而問之曰我昔作罪多不知數二尊方便令我懺悔又耶舍曰王昔所近八萬眾宜可廣作諸大佛事方得勉之若不如此當作蠅虻不可得度尒時大王告海意曰我有一樹與我同生其葉潤澤亦有其子子有光明每至此樹心即安隱故乃名之阿育之樹我為此樹忽爾凋殘醉悞從亦有數千今遇尊者如何拔濟我所力及悉不惜之尒時海意告王曰王欲殄累無過造佛寶塔而用嚴飾散于他土彼國見之當生希有而資後福今亦有益王曰何物所造復高多少并是幾所又安何處海意告曰宜造八萬四千所用以七寶五寶為粖二寶銷鑄以為一摸高一尺四寸若此塔成其罪消滅當於後𠀍又生梵天非處於此尒時大王因樹立名為阿育阿育王者此土譯云無憂王也尒時無憂王聞師所說心生歡喜悔改前行即敕鬼眾并及御者而索七寶便造此塔每一塔中置一垂鍾盛佛舍利四面無門唯有四相如上已說更不再舉王置功勣眾共辨彼不久一白當得畢功尒時大王白耶舍曰此塔已成就畢當有八萬四千所伏願二尊指示於我當安何處尒時海意又告王曰其塔既成請取鬼眾八萬四千各持一塔而候耶舍尊者而作神通其光盡處當下一塔其所下處皆是諸佛入滅處菩化度處羅漢神通處導師三昧處聖賢證果處修習禪定處此六上妙地而可安此塔尒時阿育王即敕鬼眾八萬四千至於會所各持一塔而候尊止尒時耶舍比丘即從座起用其左手五指甲內忽放光明照曜天地其光道數八萬四千八方輝赫如日無異尒時摩拏羅告王得度日今此苑中於先𠀍中曾有一僧名波羅迦於此證果後遷宮殿方飾于此今現此塔是其一數昔時育王所制也摩拏羅印國土章指泉示化品第二十八尒時西印度國王得度聞摩拏羅而說昔事心自歎言即曰時中虛度多𠀍如盲摸象非辯處所我今有者咸悉昔福非是今日而能建立我此身者猶如夢幻終不堅實今遇尊者須投告之令此身心速寤先𠀍所有業累當自殄滅即命太子冊立為王而付國位致一大會廣施憣蓋多設寶𢉰而命眾聖咸登此會王供養已便投出家尒時摩拏尊者即與出家出家既已取一金鑪焚香告白云西印度天子得度投佛出家願尊憶持令至道果尒時空中而有聲曰汝度此王當不憂慮却後七日而獲羅漢師聞是說眾亦歡喜是時眾僧守王七日觀成證道當第七日有大風雨不令雜眾在王宮室所有雜眾悉自不住直至午時王在道場合掌端座須之頃猶如夢中又自坐睡夢見一人手長萬丈身處于座其座亦高垂手執果當令食之既夢食畢地大桭動王即座覺心如日月覩見他國舉身輕利不似昨日信禮諸佛深自幸故得遇其事當何如之王出家已得證道果獲阿羅漢得六神通即作神通而入三昧離彼宮殿別處幽閑即與尊者而共持論曰故知我昔未得證果時唯有彼國不知諸佛國土有若干種令此寤後却返觀彼至是微劣最小一國又曰其人未證果唯見彼及處今日證果後如日虛空住又人未寤時猶如一小蟻唯知𭔐穴測更不知他土不信有諸邑唯人所到處其蟻未曾至悉言彼非有蟻中修行者後得為其人能見諸聚落亦復能往返此人行百里更遠不能至猶於果位中聲聞小通者為有𦝫脚疾遠行不能及聲聞多疑礙不得至菩提又有不能行人心亦不怯弱游諸國土中已經千萬里若約於蟻眾如我得神通我雖說向彼彼亦如夢中眾生不信佛不知有佛國亦不信賢聖如彼人𠀍蟻蟻即遠不知其人悉能到我今得神通佛土亦知悉一切十方土無有不達者我今對人況猶彼蟻中人我化諸有眾說向我證果以游諸國土後眾心不信亦不入彼意引此前事況猶若人中蟻又曰我觀此南閻浮提如一食盤於其中閒數有八萬上中下等各有多少其上國者而有一萬中國者而有二萬下國者而有五萬此三等者大編其數於上國中自有三等於中國中亦有三等下國中亦有三等如九品法隨已修行盡得生彼尒時摩拏羅告得度曰我欲化導至于他國有一智者欲出于𠀍得度曰尊者神力能應十方此作神通何假就彼尒時摩拏羅即以金鑪焚其寶香乃告月氏國鸖勒那曰汝在彼國能化鸖眾道果當至汝知之乎尒時鸖勒那比丘在月氏國於一林中常念大品彼國國王名曰寶印常供養此鸖勒那比丘此尊者常住此林經于九百常感鸖眾銜花獻之彼王請出此林而命宮中供養尒時尊者即順王意隨至宮殿座猶未久有一道香煙至于尊前鸖勒那謂王曰今此香至王可識不王曰此香是天信不鸖勒曰不是天信王曰是何香故而至于此鸖勒曰是西印度摩拏羅尊者信至于此王曰此師者當是何人鸖勒曰是那提國王之子身有大力過去刧中曾遇娑羅樹王佛而與授記汝於賢刧之中當得為祖導化無量次二十二王宜面西而作頂禮尒時大王合掌遙禮是時鸖勒即從座起整頓衣服面西而作禮尒時摩拏羅尊者與得度羅漢言說法要之次忽然以手點地三下得度羅漢曰何以摩拏羅曰此是鸖勒望此作禮我以手按地而用荅之告羅漢曰我欲往彼而化導故此者得通而繼於我尒時尊者即作神通往于月氏是時鸖勒告寶印王曰師欲來也宜當迎之尒時大王即嚴四兵而近千數又以象輦莊嚴一座王與鸖勒俱乘一象同至西來未至于遠當逢尊者同歸宮殿二俱禮信深共瞻仰尒時鸖勒有一弟子名曰龍子年二十二才名竒特師欲觀彼作何智慧而足聰辯纔入定中悉不觀見不能辯了尒時鸖勒即問尊者此子先𠀍曾為何業於此今𠀍而有智慧我昔曾觀都不了見未明此子是何因緣尒時摩拏羅問鸖勒曰汝入定時觀于此𠀍當得幾刧鸖勒曰我入於定當觀三𠀍摩拏羅告曰此龍子者非在三𠀍之內而修功德鸖勒曰於何𠀍中摩拏羅曰此龍子者於第五減刧中而於妙喜國土生婆羅門家有一伽藍新鑄一鍾可重一萬彼子長大善採栴檀見鍾既成而奉一槌以充撾擊而施鍾者已獲菩提於三𠀍彼子施搥感於因緣聰明獲於五刧非是三𠀍之內而能辯之尒時鸖勒聞辯其事心生信慕而欲奉延依從事之問尊者摩拏羅曰我於昔刧曾在何土以何因緣而感鸖故我久觀察亦不明了伏願尊者為我說此因緣而令得知尒時摩拏羅告鸖勒曰汝先𠀍第四刧中曾為比丘有大福德心通至理廣演言教化度一切雖神通故而無宿命每將第子一百二百常受供養尒時大海有一龍王請汝供養汝作神力獨自往彼尒時弟子各自念言其師往彼何當不歸汝在龍宮亦知弟子思念即於龍宮受供養已却作神通至于本座時諸弟子忽然見師却歸本座諸弟子曰師前徃何所又至誰舍未至須還來本位師曰我至龍宮當受供養諸弟子曰師當後去我亦隨彼尒時龍王復命尊者時諸弟子欲擬隨往師曰今此齋者非汝所食諸弟子等第相謂曰師常說法於食若等於法亦等云何獨徃而彼食之尒時尊者却歸本座便入禪定觀諸弟子有大福德消彼龍宮供養得不於彼定中無有一人可消此食師出定已默然不說又於一日龍王自來至師座前復請供養時諸弟子便欲隨往師曰汝等諸人不用隨我我念汝故故不將汝諸弟子曰師不念我我不隨師師既念我我即合去尒時尊者即領弟子同赴此會𩚳食充足亦無諸患此諸弟子雖無諸患為師蔭故當獲如是師後滅度已當生諸國隨所福業而生勝處其諸弟子為受此食經于五刧不得為人常生鳥中今此巡受當作此鸖共會一林師巡勝處合生此土月氏之國婆羅門家而處此土常念大品人禽雖異各處一途為昔業故而當再會尒時鸖勒聞師說已殷重恭信心生悚慄乃告尊者曰我修何法當令鸖眾而得成人摩拏羅曰我有無上法寶是如來藏尒時𠀍尊付于迦葉如是展轉乃至于我我今將此正法眼藏付囑於汝汝當守護無令斷絕彼眾因汝悉得解脫汝受吾教而說偈言心逐萬境轉轉處實能幽隨流認得性無喜復無憂是時鸖勒聞師法偈踊躍歡喜作禮圍繞頂戴奉持尒時摩拏羅付法已竟即從座起涌身虛空作十八變訖却歸本座以手指地化為一泉而說偈曰心地清淨泉能潤於一切從地而涌出徧滿十方濟說此偈已寂然不動尒時大眾號慟攀戀共焚舍利起塔供養時當此土後漢第十主桓帝十八年乙巳之歲入涅槃也第二十三祖鸖勒尊者章辯難氣品第二十九尒時鸖勒尊者月氏國人也姓婆羅門父名千勝母號金光尒時千勝長者在于彼國多有財帛其富無量雖有財寶而無子息彼國之中有一金幢所有人眾心有求者悉皆得遂幢上有字以銀作之名為七佛真幢彼千勝長者為無男女至于此幢而設供養乃稽首曰稽首七佛師我今求因緣為無子息故從尊丐一子尒時千勝長者願是事已却歸本舍謂金光曰我於勝幢處供養七佛已發其一大願求丐一子息此母聞其事即以金鑪而焚寶香至心𧆛重忽於夜後子時夢見須彌山上有一童子手持玉環告金光曰我來也其母夢已當告千勝曰我於昨夜子時夢見須彌山上有一童子手持玉環云我來也其父聞說心即歡喜告金光曰其夢甚善必當有子從此夢已身體安樂無諸𮕱患其家清淨人悉好善往來比丘時時至舍忽於一日有一三藏來至此舍是時金光頭面作禮時三藏告曰汝善保護勿令此子而有觸汙金光曰我自懷來近經十月一身清淨合舍亦然金光又問三藏曰此子生後有少福德不三藏曰此子福德不同俗𠀍多有財寶佛已授記為大祖師當度千眾演無上法利益七𠀍得五通果而具三明及八解脫此子先𠀍第四刧中曾於龍宮廣開法藏當須善育而自保愛尒時金光十月滿足當誕其子於此日中天花自落地現金錢覆于路彼國使者聞奏於王王自至彼觀其異瑞天花地錢王曰我借此子將至宮內父母奉敕不敢違製尒時大王將入宮內與諸采女令信養之時諸采女有百千眾彼此爭覓各欲養之其子分身徧百千女尒時大王忽覓此子其諸采女有百千人各執一子而奉上王王曰我只一子何有多許采女具白一一前說王曰此諸子等都有百千我將來者為復何是諸采女等各言此是尒時童子化身徧宮延有百千本來身者而歸父舍尒時大王即啟告曰我今無太子欲收於汝故尒現多身者令我心不定汝有神通故當現却變化汝無神通者常作宮千子尒時大王言猶未訖百千采女各於懷中所抱子處放其光明有百千道瞥然不見更無一子唯有真者在父母處而自安養年至七歲獨往諸處彼國有鬼號曰拘羅每有人眾共相祭祀時彼童子而至此處其鬼真影悉自崩倒每自歎曰三界微薄多有邪鬼不遇一人而會正法如是長大年二十二遇一尊者而與出家又於羅漢山受戒此師唯教念大品經如是念經至三十年當遇摩拏尊者有信香煙而至月氏此縣致禮彼按于地彼欲降至此自覺知共王計會而徃迎奉并問先𠀍而悉了知致信為師近侍接足得付法已獲五神通游化他國至于一剎名中印度彼國有王名無畏海深信三寶而樂說法欲識往事常靜思念鸖勒欲至彼國王作一夢夢見日出照我身心於此夢覺命大臣至而說此夢大臣曰王此夢者必有聖賢不久入國尒時大王即敕諸門有聖者來當須奏報尒時鸖勒尊者與諸大眾同入此國彼城門者而當告奏王聞是已即出四兵嚴諸象輦如法奉迎至于殿所瞻仰作禮深自信慕尒時鸖勒尊者坐猶未久有二人至禮拜尊者卓然而立一人著緋一人者白尒時無畏大王心自念言此二何人不信於我尒時鸖勒尊者知王舉意怪此二人乃告大王曰識此二人不王曰未省師曰此是日月天子致信於我王曰云何識知師曰我於昔刧曾生於彼而為說法當因我度生於日月之宮尊者言訖忽然不見唯聞異香徧于國土王問師曰今此日月約有幾許所生國土合有多少師曰似此日月約有三千如彼國土近有八萬王曰此諸國土為復一時為復先後師曰於此數內而有三等隨刧前後王曰此之三等復名之何師曰名之六冥而有先後六冥者上氣貫下下氣昇上四維交合名之六冥六冥之中而有三等何等為三大刧之初四禪下降而為田主亦曰大人而姓剎利日月天子而興光明此為最初名之大刧其數國土前後有者共計八萬四千用為正數始分三等有一處所上下四維其氣交貫唯四禪天獨能覩見同地諸界悉不知及亦不聞說何以故雖從天降而生剎利為墯凡故而闕他心除此天見復有聖者羅漢而生人中為化眾生者亦能知之六冥𠀍界六冥三等一等六冥命壽千萬一等六冥命壽百萬一等六冥命壽十萬上壽千萬歲者其𢒈神頭龍身至於減數其𢒈漸好亦有男女當後資盛中百萬歲者其𢒈龍頭人身至於減數其𢒈漸好亦有男女漸漸資繼下十萬歲者其𢒈人頭蛇身至於減數其𢒈漸好滋茷繼績儒童菩亦能辯此迦葉菩故以知之釋迦如來無不見耳唯我小通悉不遠見一城芥子未捻一顆尒時無畏大王聞師所說心開意解深知𠀍界而有無量凡夫見淺悉不識知將謂此國諸所不及尒時鸖勒尊者即辭出宮而欲往化王曰尊者時降不為猒離尊者曰我受王施當荅之是時尊者隨所行化有一弟子名龍子其此弟子兄弟二人兄名師子其次龍子事於尊者經于七年至二十四身已滅度乃告彼舍父母而令知委尒時父母并與師子比丘同至師所欲舉此弟將歸舍宅而安殯之眾共舁舉悉不可動乃白尊者曰此子既亾我不能舉為是何故當因致此尒時尊者告師子比丘曰此非我咎當因汝焉師子曰我有何故當不了知請師為說鸖勒告師子曰汝弟去後經于二年汝事婆羅門常學修定忽於夜靜心念龍子欲造功德汝師善塑塑得一佛為汝弟故汝未莊嚴便經暗昧汝棄此像在於地下別新者安乎座上汝今歸去收取地像安于座上其弟必舉更無再三尒時師子比丘歸至舍所收得地像歸于座上即焚其香廣發其願禮信懺悔從此而已却來師所共取其弟更不難舉當時歸舍而安塟畢尒時師子彼師亦亡心樂尊者來師鸖勒年二十五福德深遠才明絕𠀍遇於尊者禮事為師而問之曰我欲求道當何用心鸖勒曰汝若求道無所用心師子曰既無用心爭作佛事鸖勒曰汝若有用即非功德汝若無作即是佛事何以故經云我所作功德而無我所作尒時師子比丘聞師說法心開意朗作禮圍繞却住一面是時會中有一比丘即從座起合掌恭信問鸖勒尊者師既無我所勤久修功德而獲於宿命合知我等眾有無諸福業師舉右手指於東北告大眾曰見此氣不大眾曰不見師曰此是麁相尚由不見何況微細功德欲知他心宿命時師子比丘白師曰眾雖不見我適覩及師曰汝言覩見試說其相令吾知悉師子曰今此氣者其色如雪卓然上下而貫天地復有一氣其色如墨有其五道撗通前氣如忉利梯師曰汝識此氣知于首事及未來應不師子曰我見此氣唯覩現在未來昔事不能知悉尊者慈造為我解說師曰吾滅度後五十年末此北天笁國而有其難我今不說汝當後知尒時師子比丘當自念言我師大惠深達其事非我所及而不說之乃告師曰欲詣諸方而徧參覲願師慈造當賜我去鸖勒謂曰吾今年邁欲入涅槃擬持此法將付於汝汝有深達當赴我意又告曰如來以大法眼付囑迦葉如是展轉乃至於我我今將此正法眼藏付囑於汝汝善護持外方行化國當有難𢒈在汝身早須付授無令斷滅汝受吾教聽吾偈言認得心性時可說不思議了了無可得得時不說知尒時師子聞說法偈深生信重而受教誨又問師曰我有何難復是何業而致𢒈害尊者語曰汝於先世第五刧中作一白衣身多學業無不解者汝於佛法亦少存意於諸學眾皆得第一心常得便亦不䟽失有一白衣好設無遮大齋亦明佛法常修善業汝赴此會喫此無遮心復輕倨不有彼士汝便致問彼士酬荅皆論佛事不失聖意汝即撗難多有䟽失不自思惟心有憤怒汝令隨侍之者執其毒藥此齋首唯此一事而未還之探受福報經于四刧今𠀍相逢定是還矣尒時師子比丘依師言教頂戴奉持是時鸖勒尊者付法已竟即從𢉰起涌身虛空作十八變已却歸本座寂然滅度尒時大眾欲分舍利各自起塔臨闍維訖擬分舍利尒時鸖勒尊者現身說偈曰一法一切法一切一法攝吾身非有無何分一切塔時眾聞偈更不敢分即於本處起塔供養時當後漢第十二主獻帝十九年己丑之歲入涅槃也第二十四祖師子比丘章辯珠品第三十五明大集尒時師子比丘者中印度人也姓婆羅門自小聰辯多有智慧於彼國土有一婆羅門僧而為度脫少習禪定常好安靜兄弟二人悉入佛道其弟龍子尊先事鸖勒尊者得于七年彼尊者從月氏國往其中印度其弟亦至纔到本國其弟亾化昔師子尊思念此弟為塑一佛未得莊嚴經于暗昧棄于在地別置新者後弟終沒取其靈骸重如山岳悉不能動即白鸖勒尊者而問此事師即為說具在前文即舉其弟悉不為重將歸本舍而安塟之尒時師子師已亾歿遂至尊處依止禮拜而問學道當何用心鸖勒曰汝若求道無所用心師子比丘曰既無用心爭作佛事鸖勒曰汝若用心即非功德汝若無作即是佛事何以故經云我所作功德而無我所作又告師子比丘曰如來以大法眼付囑迦葉如是展轉乃至於我我今將此正法眼藏付囑於汝汝當護慎無令斷滅汝若外方行化國當有難形在於汝早須付授勿令斷絕尒時師子尊者受鸖勒言教戴奉依命而自重信是時師子比丘得付法已身心安樂隨所教化至于罽賔彼國之中有一僧塔常多供養此塔中僧名波梨迦先在𠀍時有大福德智慧深遠常習小觀而學禪定善巧通達辯才無礙雖是一法而出五眾有學禪定有學知見有學執相有學捨相有學不語此五眾中各依本學皆得其意尒時師子比丘至彼國中與此五眾而共持論先與持不語眾而為說佛真教演波羅蜜誰教不語而禁佛耶又為捨相者曰佛說威儀具足梵行清白何於此相而為捨耶又謂執相者曰佛土清淨自在無著何於執相而定得耶又謂知見者曰諸佛知見無所得故此法微妙覺聞不及無為無相何知見耶尒時四眾悉被徵責皆悉杜嘿猶有一眾多習禪定彼眾之中而有一師名達磨達久近尊者波梨迦師深達實相樂學禪定聞此四眾悉被徵責而故來此欲難師子比丘尒時師子亦見來已謂曰仁者習定何當來此若也來此何曾習定達磨達曰我來此處心亦不亂定隨人習豈在處所師子曰仁者來也其習亦至既無處所豈在人習達磨達曰定習人故非人習定我雖來去其定常習師子曰人非習定定習人故當自來去其定誰習達磨達曰如淨明珠內外無瞖定若通達必當如此師子曰定若通達一似明珠今見仁者非珠之徒達磨達曰其珠明徹內外悉定我心不亂猶若此淨師子曰其珠無內外仁者何能定穢物非搖動此定不是淨尒時達磨達即從座起禮拜師子尊者云久受勤苦亦無所解今遇尊者如飢渴人得近天饌當賜依近而可得食是時師子尊者告達磨達曰彼諸眾等瞻仰仁者年德高厚今於此住當乖眾意尒時達磨達頭面作禮歡喜踊躍伏願尊者當賜教誨師子告曰諸佛禪定無有所得諸佛覺道無有所證無得無證是真解脫又曰道無所得定無所證於諸相中悉不能主行住自在無所計著酬因荅果𠀍所業報於此道中悉不如是若言道者進之不先退之不後單之不隻雙之不𨷖薄而不輕重而不厚汝學於定其道相湊尒時達磨達聞師說法心生恭信瞻仰尊者如己父母尒時師子尊者在彼國土之中說法度眾如殑伽沙是時國中有一長者生得一子名曰斯多年近二十左手之中拳似執物自生已來悉不曾開其父夜夢有神人令將此子送與師子教毉此手其父覺已心自念言雖有一子手不具足若遇善者當從出家我不留悋尒時師子比丘在於座上作是思惟我至此國近五十年無一法器而成立者作是語已入定觀察得寤昔事即出定日有一童子不久合至尒時長者即領其子依夢神語借訪師子至于座前禮信尊者白其前事令子事師尊者納受亦無所疑告眾人曰汝等識此童子手中而有何物眾人曰不惻尊者曰此童子手中是一寶珠何以故我於先𠀍之中曾為比丘常念龍王經有一童子名曰婆舍將隨諸處受其供養忽於一日有一龍王請吾赴齋令此童子而隨從之至彼齋畢龍惠一珠令彼童子而收掌之我於一日當自滅度處于事而生於此彼子後終手執其寶心常孝順感于生此尒時尊者即令婆舍童子汝便開手當過珠來尒時婆舍童子即展其手當現一珠不失前意尒時師子尊者即與出家當命聖者而與受戒得度脫已師告曰汝先名婆舍今字斯多汝莫別號統為一名名婆舍斯多又曰吾常觀察今此國土當有魔起吾今年朽𢙢入涅槃師預記我法在吾身必當形害又曰如來以大法眼付囑迦葉如是展轉乃至於我我將此法并僧伽梨衣付囑於汝汝當護持無令斷絕汝受吾教聽吾偈言正說知見時知見俱是心當心即知見知見即于今又告曰汝受此教傳於外國勿令斷滅彼若生疑當已吾衣用為法信汝速出國莫住於此尒時婆舍斯多言善哉善哉躬受其教頂戴奉行時師子尊者付法既已時罽賔國中有外道兄弟二人隱山學術兄名魔月多弟名都落遮落遮學法纔成啟兄言曰我欲𩢆術盜入皇居作法變徒欲寶位兄語曰汝若現身應須變相恐後究跡悞累宗枝落遮既聞兄許即𩢆神術夜往帝宮化徒為僧覆思二事我法若成便昇寶位我術若敗過落沙門纔起此念神力不加宮巡覺而射之中箭悉皆墜地而死宮官聞奏北天王彌羅崛云有數百沙門夜後作法入宮遇宮巡使揔皆射落尒時北天大王極甚驚怒此事非輕不可容捨順遵善事宗信如天逆惡生頑不疑之地朕虔崇釋教將為導師何期沙門亂我宮國古來塔寺多藏怪徵訛見道人揔須歇滅王乃邪見熾盛破壞寺塔殺害眾僧每加惡言謗毀正法時師子尊者數告眾僧曰王有惡念必當為我等輩而無利益諸人聞師子語遂欲移尊者隱山師曰吾觀蘊空故不迣耳後北天王彌羅崛果杖劒而來至師子所問曰師所得法豈不無相耶師今得不荅云已得王曰既得無相生死有懼不荅已離生死王曰既離生死計應無懼可施我頭師曰身非我有何況於頭王即舉利劒斷師子首斷已無血白乳涌出舉高一丈其王右臂忽然自落王便驚怖悔過邪見時有太子名曰光首見父如此心大憂怖乃問諸臣設何方便救得父王時群臣曰當在聖𣅀太子曰若有智者能觀察故知我父王以何業故至于此地尒時北天王後至七日當爾命𣧩時當此土前魏第三主少帝己夘之歲入涅槃也師子弟子章撗師統引品第三十一此下一章魏支疆梁三藏續法記尒時北天罽賔國王有一太子名曰光首見王崩化心即驚寤當自念言我王何故而有此報彼至小國無有大智為我觀察令知昔由是時太子即出一敕詔諸智者同會于殿是時有一仙人止于象白山聞有此詔當自往王宮殿云我善智者而聞命故特至於此太子見已生信重問大仙曰父王何因緣而致崩于此此國有智者名曰師子尊在此五十年忽爾被王殺此師無他故不省有過誤願仙觀察知令我心安報尒時仙人告太子曰此是先𠀍業非因今日造太子善諦聽當為廣宣說尒時父王曾於先𠀍第五刧中好為無遮齋頭此師子者當於此時作一白衣多聞智慧領徙眾至于會上心生輕𢢔尒時齋主即至會中此白衣與齋主言論多有䟽失齋主荅應皆合大理亦不失次眾人共笑云此無理此白衣人心多勇健於諸言論悉得第一忽於此日而失其便即令從者密持毒藥此齋主尒時齋主尋被此藥悶絕而卒此白衣者經于四刧彼福壯故諸患𮕱弱且受福報今此果熟而來還債齋主福報當合為王彼道業成而為師子今此相會而酬宿因非是今生斬新造得尒時光首太子聞說昔事心即崇重為王作福廣設檀施又捨玉石而與尊者起塔供養光首太子重賜仙人金銀玉帛是時仙人不受一物即告太子云歸本山仙人語光首太子曰深生信敬不久即位當得為王名光首尊太子作禮送出宮門尒時達磨達是罽賓國人也與師子尊者道德並興因師子尊者破彼五眾其師自至欲與師子尊者徵責其義經于數疊悉不得勝心自賔伏依從侍覲彼達磨達是北天七萬七千羅漢之上座也英俊當時五天獨秀師資相受都計三代自有二十二人此達磨達下有二弟子一名因陀羅摩二名瞿羅忌利婆此上二師是達磨達親承弟子二人共造毗婆沙論現行於𠀍故不錄焉此達磨達遷化當此土前魏第三主少帝時癸未之歲也此因陀羅摩遷化當此土東𣈆元帝二年己夘之歲也此瞿羅忌利婆遷化當此土東𣈆元帝十年丁未之歲也此因陀羅摩者有四親承弟子第一者名達磨尸利帝當此土東𣈆第七主廢帝時壬申之歲滅度第二者名那伽難提當此土廢帝時癸酉之歲滅度第三者名破樓求多羅當此土東𣈆第五主穆帝時辛酉之歲滅度第四者名波羅婆提當此土東𣈆第七主廢帝時庚午之歲滅度此上四人並是因陀羅摩親承弟子也此瞿羅忌利婆有二弟子第一者名婆羅跋摩當此土東𣈆第九主武帝時壬午之歲滅度第二者名僧伽羅又此師作禪經數千偈五百羅漢之上首也當此土東晉第七王廢帝癸酉之歲滅度此上二師並是瞿羅忌利婆親承弟子也前達磨尸利帝有二弟子第一名摩帝披羅當此土宋第三主文帝元嘉八年辛未之歲滅度也第二者名訶利跋茂當此土宋第三主文帝十二年乙亥之歲滅度此上二師並是達磨尸利帝親承弟子也前破樓求多羅者有三弟子第一者名和修盤頭當此土宋第二主少帝景平二年甲子之歲滅度第二者名達磨訶帝當此土宋文帝時四年戊辰之歲滅度第三者名旃陀夜羅多當此土宋文帝二年丙寅之歲滅度此上三師並是破樓求多羅親承弟子前婆羅跋摩者有三弟子第一者名勒那多羅當此土東𣈆安帝時丁巳之歲滅度第二者名盤頭羅多當此土宋文帝二年丙寅之歲滅度第三者名婆羅婆多當此土宋文帝十八年壬午之歲滅度此上三師並是婆羅跋摩親承弟子也前僧伽羅义者有五弟子第一者名毗舍延羅多當此土東晉第十主安帝丁巳之歲滅度也第二者名毗樓羅多摩當此土宋第二主少帝時癸亥之歲滅度第三者名毗栗蕙多羅當此土宋文帝元嘉四年丁卯之歲滅度第四者名憂波羶䭾當此土宋文帝十年癸酉之歲滅度第五者名婆難提多當此土東晉第十主安帝時乙卯之歲滅度此上五師並是僧伽羅义親承弟子此上并達磨達四代共有二十二師尒時迦葉為首直下血脉至般若多羅有二十七師名為正祖自達磨達下二十二人自為一枝於罽賓國中王化為有難後隱于罽賓南象白山葱塗源經得一百後中天竺國支疆梁樓游北天至罽賓國南届葱塗源尋象白山忽見一僧居一茨室有二弟子親承事之即是因陀羅摩瞿羅忌利婆也三藏向前致禮問曰和上於此山中經多少歲復名云何是誰弟子達磨達荅曰是北天笁人因彌羅崛王起難方隱茲山自從此居已經一百年朽衰邁行不堪任本師波梨迦次依師子住三藏又問曰某乙昔聞師子否迬於此特訪其由五教興衰為是禪是律達磨達荅曰自調御滅後法教流行迦葉傳持大乘心印如是相付至師子大尊見授命衣法正任其嗣者則有南天竺國同學婆舍斯多彼南天梵名曰婆羅多那也自師子尊者在日傳付衣法令速往南天唯此同學賑物利生是傳師教此三藏既蒙師說則知其由云某某昔届南天早覲婆舍今覩尊語實無誤焉便辭達磨達而來震旦至于雒陽住白馬寺當前魏第五主常道卿公諱奐字景明丙无元年辛巳之歲去師子遷化時經于二載方降此土即當此時也此常道卿公燕王彭祖之子雖在其位不蒙其志不稱天子常自謙讓又叔少帝齊王一歲登位至年十六讓位與定王霖子定王霖子懼司馬昭不敢稱王號高貴卿公在位六年年二十薨雖有六年之位少帝助之治化不顯其謀前常道卿公便次于後而座四年亦讓少帝不敢自尊此二公登位如攝國朝非帝名也尒時支疆梁樓在白馬寺此常道卿公曾至禮覲問於國壽後當永不三藏讖曰二公賴虛位獼猴正當路五人抱一鷄鷄鳴獲不措常道卿曰此言甚善必無累矣作禮辭去三藏又曰一一人好去兩兩歲平安女子生河內朱輪上進壇是時常道卿公即歸宮內告諸王子說此前事悉不能惻自茲已還經于四載前魏絕嗣乙酉之歲司馬炎登位稱于西晉河內人也即是司馬昭之子也改為太始元年是時晉魏之閒名僧二人三藏四人悉會此處共譯經一十三部以為魏朝經錄矣并括祖師遷化年代共詳本事僉于此名僧二人者一名曇柯二名白延三藏四人一名支疆梁接二名安法賢三名曇諦四名康僧鎧此上六人並通聖矣
