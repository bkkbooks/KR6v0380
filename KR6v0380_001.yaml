body:
  text: 以上缺三紙王子從德號能仁瞿曇之而改立梵語釋迦文唐言能仁者𠛴有利益諡之𠛴利王復案普曜經云佛初生𠛴利王家放大智之光明照十方之𠀍界地湧金蓮花自然捧足東西及南北各行於七步分手指天地作師子吼聲上下及四維無能尊我者後至昭王四十二年涒灘之歲二月八日太子年登十九欲求出家而自念言當復何遇即於四門游觀見四等事心有悲喜而作思惟此老病死終可猒離唯有迦葉波羅提佛末教弟子是真歸處既思念已而作是言我求於出家必應有所契父王大慈造必應聽許我爾時太子志求出家父王愛念而當不許是時父王勑諸伎樂悅樂太子太子不樂復於分子時有一天人名曰淨居於窗牖中義手白太子言出家當至時可去矣時可去矣太子聞此語已心生歡喜即念命車匿索馬四神捧足踰城而去爾時太子當自念言夫出家者心行哀慜具大慈悲當行敬順不於物若不留一馬跡王必罪於門者即於城西北角留一馬跡知騰空而去爾時太子後往擅持山中修道此山有其五峯名字復各有異中心最高之者號曰彌樓寶山此山出其皓玉譯名那爛雪陀復名中象頭矣此山四面上各有一大峯南面名香山西面名檀特北面名班吒拏東面名茶那山中於以下缺一紙半身三者煞盜淫口四者兩舌惡口言綺語意三者嫉妒恚此十事不順聖道而名十惡太業若解悔之而歸至理十善行耳佛言人有衆過而不自悔頓息威容諸惡生已罪來赴身如水歸海自成深廣何能免離若人有惡自解知非改過得善罪自消滅如病得汗漸有痊耳佛言愚人聞善者善之故惡來撓亂汝自禁息當無嗔責彼自惡者而惡之有人聞吾守道行大慈悲惡者來往故致罵佛佛默不對慜之癡冥罵止問曰子以禮從人其人不納禮歸子乎今子罵我我亦不納子自持禍歸子身矣猶響應聲影之追形終無免離慎勿為惡也佛言惡人害賢者猶如仰天唾唾不至天公還從己身墯逆風揚惡不能汙上人賢者不可毀禍必降凶身佛言夫人為博愛道必難會守志奉道其道甚大覩人施道助之歡喜重加福報人天善利佛言猶如炬火數千百輝洞見諸像道亦如之佛言飯惡人百不如飯一善人飯善人千不如飯一持五戒者飯持五戒者萬不如飯一須陀洹飯百萬須陀洹不如飯一斯陀含飯千萬斯陀含不如飯一阿那含飯一億阿那含不如飯一阿羅漢飯十億阿羅漢不如飯一辟支佛飯百億辟支佛不如飯一三𠀍諸佛飯千億三𠀍諸佛不如飯無念無住無修無證之者佛言天下有二十難貧窮布施難豪貴學道難判命不死難得覩佛經難生值佛𠀍難忍色忍欲難見好不求難被辱不嗔難有勢不臨難觸事無心難廣學博究難除人滅我難不輕未學難心行平等難不說是非難會善知識難見性學道難覩境不動難善解方便難隨化度人難有一沙門問佛以何因緣得知宿命會其志道明見諸有佛言道無形相知之何益要當守志如摩鏡師精心用意而得塵盡垢去明存即自見形如覩諸有斷欲無求當得宿命有比丘問佛何者為善何者最大佛言行道守真者善志與道合者大有沙門問佛何者多力何者最明佛言忍辱多力不壞惡故兼加安健忍者無惡必為人尊欲最明者心垢除滅盡清淨無瑕穢未有天地逮于今日十方所有未嘗不見無有不明無有不知無有不聞得一切智可謂明乎佛言人懷愛欲不見道者譬如濁水致力攪之衆共臨水上無能覩見形影者為愛欲交錯心中興濁故不見道若人漸解懺悔來近知識水澄穢除清淨無垢即自見性耳佛言夫為道者譬如持炬入冥室中其冥即滅而明猶存學道見諦無不明矣佛言吾法念無念念行無行行言無言言修無修修會者近爾迷者遠乎言語道斷非物所拘差之豪犛倐忽須佛言覩天地念非常覩𠀍界念非常覩靈覺即菩提如是心識得道疾矣佛言熟自念身中四大各自有名都為我故我既不起其如幻耳佛言人之隨情欲求聲名名之顯照身之故耳身雖故已而受諸惡名之顯己𠀍之常名而不學道抂用功勞譬如燒香雖人聞香香自燼矣危身之火悔之在後佛言財色於人人之不捨譬刀刃有蜜不足一食之餐小兒之有害舌之患也佛言人繫於妻子士寶舍宅之患其甚牢獄牢獄有𢿱適之文妻子無合之理情欲所愛於色豈憚驅驅雖有虎口之禍心存甘伏投泥自溺故曰凡夫透得此門出塵羅漢佛言愛欲莫同色若二同者孰為道人佛言愛欲人猶如執炬逆風而行貪色興欲而有乎不順天道而必燒手也天神獻玉女於佛欲以試佛觀佛道意而定遐邇佛𮧓囊衆穢爾來何為以可斯俗難動六情去吾不用汝天神踰敬內問道意佛為解說即得須陀洹果佛言夫為道者猶若木在於水尋流而行不觸兩岸不為人取不令鬼神所遮不為波浪所住亦不腐敗吾保其此木決定入海矣人為道者不為欲情所惑不為衆邪所撓精進無疑吾保此人得其道矣佛告學道者慎無信汝意意終不可信慎勿與色會色會即禍生當得阿羅漢乃不可信汝意佛告諸弟子慎勿視女人亦莫共言語身得無上乘視語都無污視色無色想對欲無欲意蓮花不著水清淨超於彼老者父母想中屬如親屬稚者如子孫幼者如兄姊妹一度一切衆見世得出世若依如是解無錢亦富貴佛言人為道故當捨情欲如彼乾草火來須避道人見欲必當遠之佛言有人患淫不止踞斧刃上以自除其陰佛謂之曰若斷其陰不如斷心心為功曹若止功曹從者都息邪心不止斷陰何益斯須即死佛言世俗倒見不善吾理如此癡人殘形質斷聖味故未可會道佛為偈曰欲生知汝意意以思想生二心各寂靜非色亦非行佛言此偈是迦葉佛說流在世間佛言人從愛生愛從憂生憂從怖生若離於愛何憂何怖佛言人為修道譬如一人與萬人戰挂鎧排兵出門欲戰意復怯弱畏生死魔乃自怕怖或半路而還或格而死或得大勝負還國高遷若人能堅持其心精進勇鋭不或前境滅盡陰魔不久得道矣有沙門夜誦迦葉遺教經其聲悲緊欲悔思反佛勑問之汝處于家昔為何業對曰愛彈琴佛言絃緩如何對曰不鳴矣絃急如何對曰聲絶矣急緩得中如何對曰諸音普矣佛告沙門學道亦然心須調適道可得矣佛言夫人為道者猶如鍛鐵去𡱁成精器必好也學道之人先去垢染行自精細於道若暴暴即身疲其身若疲意即生惱其意生惱行即𨓤矣其行既𨓤罪必加矣但清淨安樂不失道矣佛言夫人離三惡道得為人難既得為人去女即男難既得為男六情貌具難六情既具生中國難既處中國值諸佛難既值佛已遇道者難既遇道者興信心難既興信心發菩提難既發菩提無修證難佛問諸沙門人命在幾間對曰在數日間佛言子未能為道復問一沙門人命在幾間對曰在飯食間佛言子未能為道復問一沙門人命在幾間對曰呼吸間佛言善哉善哉可謂道者矣佛言佛子去離吾數千里憶念吾戒必得道果在吾左右目常覩見心無思慕終不得道如不疏敬仰及無懈怠即得聖位當坐道場佛言若有人得道猶如食蜜中邊皆甜吾經亦爾佛言為道人者佛所言說皆信順故能伏愛欲之根不起三業當行佛道示三昧果決得勝處佛言諸沙門行道當如磨牛無有休息身雖行道心道不行心道若行何用行道佛言吾視王候之位如過富客視金玉之寶如覩瓦礫視紈素之服如覩弊帛視大千界如一訶子視四耨水如塗足油視方便門如伐寶聚視無上乘如夢金日視求佛道如眼前花視求禪定如須彌柱視求涅槃如晝夕寤視倒正者如六龍舞視平等如真一地視興化者如四時木如上四十二章經至此土時當後漢第二主孝明帝永平七年乙丑之歲正月十五日夜夢金人身長丈六紫磨金色項有圓光赫奕如日來詣殿前帝乃驚異詔群臣問曰此為何瑞是何神人也時有通人蘇攸傅及扈多與蔡愔等對曰天竺有得道者號之曰佛不言而自信不治而不亂也巍巍乎獨出三界之外飛行自在無人能名焉此聖者滅後一千年外有教當被此土陛下所夢將必是乎帝乃上寤即遣羽林中郎秦景博士王遵等一十四人𨒦佛教至大月氏國躡遇摩騰笁法蘭二菩僧以白褻畫釋迦像并四十二章經載以白馬及修多羅等教至永平十年戊辰之嵗十二月三十日摩騰達于雒陽明晨笁法蘭至自茲已降龕塔相望神人接踵道法流布處處崇立遠人伏化願為臣妾者不可稱數遂得國雒清休含靈該潤皆賴蒙恩聖澤代代不絶矣此經梵書一十九葉即竺法蘭翻會梵音覽者細披詳之而定參省也度衆付法章涅槃品第三爾時世尊說此經已復度諸衆而為說法時阿難白佛請度波闍波提毗舍佉母等出家佛告阿難我正法住𠀍滿足千祀汝今請我度諸女人令我正法當滅五百佛告阿難波闍波提等能行八敬不波闍波提請為白𠀍尊聽我出家依佛教勑當行八敬阿難如上白佛佛告阿難及諸大衆夫女人出家能行八敬無有缺犯於我正法而得千載既受佛勑即令出家須女衆而出家者有千二百人俱合掌瞻佛而讚偈曰𠀍尊大慈造度我等出家女人五障身得遇佛解脫說此偈已生歡喜心佛放眉間白豪照于𢉰前諸菩衆咸皆欣慶瞻仰尊顏而說偈曰金色兩足尊德大至無畏眉閒玉豪相能照於大千爾時如來說五乘法而能濟度一切衆生宣三解脫而救諸有道德高遠非十翼之所詮心行處滅覺觀莫能究其終始永絶名言之外非稱量讚詠者哉大之則無邊法界小之則本覺一心內則包乎六合外則無壃遐域故經云法廣大方啓而小域一心本覺苞乎大千濟拔有無潤澤含識故我牟尼從本原性海演大教化人靡不周遍廣而無大微而非小興事法則引諸子出於火宅談理教則非言像之內一統一乘性極八周洞明十界說法住𠀍四十九年開般若之妙門灌覺道於群友五天一化大備三明得六神通及八解脫每告弟子摩訶迦葉吾以清淨法眼涅槃妙心實相無相微妙正法將付於汝汝當護持并勑阿難副二傳化無令斷絶佛為迦葉重說偈言法本法無法無法法亦法今付無法時法法何曾法爾時𠀍尊說此偈已復告迦葉吾將金縷僧伽梨衣轉付於汝傳授補處至五十七俱胝六十百千歲慈氏佛出𠀍勿令其朽壞爾時迦葉聞佛偈已頭面禮足頂出真光照二足尊如金山聚爾時迦葉躬諾歎曰善哉善哉願為勿慮我當依勑敬順佛故爾時𠀍尊至拘尸那城告諸大衆吾今背痛欲入涅槃即往熙連河側娑羅雙樹下右脅壘足泊然宴寂瞿那慟哭八部傷情再從棺起為母說法大地及日月時至皆歸盡未曾有一事不被無常吞假使妙高山劫盡皆𢿱壞譬如群宿鳥夜聚旦隨飛死去別親知怪離亦如是特現雙足化示婆耆并說無常以偈報曰諸行無常是生滅法生滅滅已寂滅為樂說此偈已放大光明照曜天地降下金身處涅槃樂時諸弟子即以香薪𥪰茶毗之此火燼後金棺如故爾時大衆即於佛前以偈讚曰凡俗諸猛熾何能致火𤑔請尊三昧火闍維金色身爾時金棺從座而舉高七多羅樹往返空中化火三昧須食頃灰生四樹收得舍利八斛四斗帝釋告請而得一牙海神興伐天使而失盜牙而起寶塔以三十二相全身建八萬四千之窣堵自𠀍尊滅時即當此土周穆王五十二年壬申之歲二月十五日自𠀍尊滅度後一千一十七年方至此漢土即永平十年戊辰歲矣賴我皇王霸善國界永清遂得天人戴仰神龍恭敬矣第一祖大迦葉章結集品第四第一祖大迦葉者摩揭國人也姓婆羅門父名飲澤母字香志昔緣所追而為金鍛善明金性而使柔伏有一貧女游行乞丐得一金珠內懷歡喜意欲為薄補治像面付法傳云久遠劫中毗婆尸佛入涅槃後四衆造塔塔中有如來像面上金色有少缺壞時此貧女將此金珠往金師所而請修薄擬飾像面是時金師修治金訖因共願言願我二人為無𡛸夫妻身真金色由是因緣九十一劫身真金色後生梵天彼天壽盡生中天摩揭國婆羅門家名曰迦葉波此云飲光勝身真金色光明赫奕照一由旬映奪諸光悉不復現故云飲光亦名金勝復號婆耆妻亦金色雖為貴𡛸誓不相觸深猒諸有欲求出家澤志聽許便投𠀍尊發𪪺誓願上法受戒清貞守素無愛無欲常行頭陀𠀍尊在日命𡋐付衣常於衆中稱歎第一爾時𠀍尊未涅槃時每告弟子摩訶迦葉吾以清淨法眼涅槃妙心實相無相微妙正法將付於汝汝可流布無令斷絶迦葉敬諾唯然受教涅槃經云爾時𠀍尊欲涅槃時迦葉不在衆會佛告諸大弟子迦葉來時可令宣暢正法眼藏并勑阿難與共傳化爾時摩訶迦葉在耆闍崛山鉢羅窟覩勝光明大地震動即入三昧以淨天眼觀見𠀍尊於熙連河側入涅槃全身捨壽迦葉從定而起慘然不悅乃告徒曰如來涅槃也何期駛哉嗚呼正法眼滅𠀍間空虛即領眷屬前後圍繞向拘尸那城至雙林樹間悲戀號泣佛於金棺內現金色雙足具千輻輪相光明照曜猶如盛日迦葉遂再開發更以千重白褻纏大化身香油注滿金棺之內栴檀沈水積茶毗佛力威神內外白褻而無有爾時摩訶迦葉告諸比丘佛已茶毗金剛舍利非我等事何以故自有國王大臣長者居士樂最勝福田者自當供養我等宜當結集法眼無令斷絶為未來𠀍作大照明紹光正法爾時迦葉作大神通往須彌頂而說偈言如來弟子且莫涅槃得神通者當赴結集說是偈已即擊撾銅撾銅之中而傳此偈聲遍三千大千𠀍界得神通者其數四百九十有九悉集王舍城耆闍崛山鉢羅窟亦云七葉巖矣爾時阿難為漏未盡不得入會當自念言我事如來亦無犯自為有漏不及衆數思惟是已曉夜經行明相出時身體疲極亞臥之次頭未至枕得證阿羅漢果心生歡喜即往鉢羅窟擊其石門爾時迦葉在於窟中問是何人敲我此戶答言是佛侍者比丘阿難迦葉語曰汝漏未盡不得入來阿難答言我已證無漏迦葉報言汝既證無漏可現神變以遣衆疑爾時阿難即𩢆神通從戶鑰中入得在衆會添數五百阿闍𠀍王為結集主因茲國王得覽小乘之教也時諸比丘即從座起咨問長者大迦葉於三藏中先集何藏迦葉語云當修多羅藏迦葉白聖衆言此阿難比丘多聞揔持有大智慧常隨如來梵行清淨所聞佛法如水傳器無有遺餘佛所讚歎聰慜第一宜可請彼集修多羅藏大衆默然允之迦葉告阿難曰汝於今者冝宣法眼阿難躬受敬諾觀察聖心而說偈言比丘諸眷屬離佛不莊嚴猶如虛空中衆星之無月說是偈已禮衆僧足即升法座而說是言如是我聞一時佛住某城某處說某經教乃至人天等作禮奉行時迦葉問諸比丘阿難所言不錯謬乎諸比丘皆曰不異𠀍尊所說於是迦葉請優波離集毗尼藏次命迦旃延集阿毗曇達摩藏迦葉即入願智三昧觀所集法藏皆無缺少因茲流布而不斷絶如上云先經次律後論者並衣大智度論明也爾時迦葉說法化度四十五年復應思惟既集法竟一切皆通宣揚傳化作大善利度脫衆生不可稱計作是念我極年邁身為衰老腐爛之體甚可猒惡無常危敗不可依護恆為諸苦之所惱害誰有智者樂於此身我今宜往雞足入滅盡定而候彌勒爾時迦葉告阿難言汝今當知昔婆伽婆欲涅槃時以大法眼付囑於我我今年朽𢒈不久留今將正法付囑於汝汝善守護聽吾偈言法法本來法無法無非法何於一法中有法有不法說此偈已心生歡喜又作是念昔婆伽婆功德所勳諸舍利我當盡禮敬而歸滅盡定作是言已即升虛空遍至諸處所有塔廟盡皆禮辭禮辭已訖還王舍城又自念言阿闍𠀍王本與我約若涅槃時必當相別遂入王城辭阿闍𠀍王故經云入大夢時預別勤敬之士可適反也王寢不遇留言付於門者令奏王知云吾當往雞足山准西域記云此山三峯如仰雞足於此山中以草敷坐結加而已作是念言今我此身著佛所與糞掃之衣及持僧伽梨等經于五十七俱胝六十百千歲慈氏佛出𠀍不令其朽壞作是念已遂語山曰若阿闍𠀍王與阿難來山當為開令其得入若歸去後復當還合言訖便入滅盡定應時大地六種震動爾時阿闍𠀍王於睡夢中見殿梁折遂即驚覺時執扄之使聞奏王知云大迦葉辭王往雞足山欲入涅槃遇王殿寢未敢奏聞王聞此語遂生悲泣云朕何薄祐諸聖涅槃不一覩見即詣竹園禮阿難足借問迦葉所在遂命阿難同往雞足王到山已山自開闢迦葉在中全身不𢿱王乃勑諸力士積諸香薪欲闍維之阿難白大王曰摩訶迦葉以定持身待於慈氏下生奉付僧伽梨竟方入涅槃如今切不可燒也王聞是說以種種供養心生悲戀然後禮辭定身却命阿難入於王舍阿闍𠀍王與阿難才出此山山合如故自婆耆入雞足山時當此土姬周弟八帝孝王五年丙辰之歲矣帝釋諸天雨諸寶花於此山上常當供養也婆耆德政章徵述品第五摩訶大迦葉尊容碑一十五徵并序朝請大夫行尚書司門員外郎上柱國常山張大成述聞如是須彌絶頂日宮照香積之天阿耨達池水輪繞金剛之地萬劫億劫有塵衆之如來三千大千有恆河沙之菩莫不生生積習十住者謂之神念念勤修成六通者謂之聖皮紙骨筆大莫大乎精心腦藥髓燈難莫難乎練行割情捨欲禪定無雙戒禁律儀頭陀第一或將身以替鹿或委命以飼虎或迸血以投鵝或刳肌而代鴿或施其兩目或施以千頭或哆肉於夜義或礫𢒈於羅剎大慈苦行不可思議佛大眷屬獨覺聖人摩訶大迦葉者中國言大龜氏本摩揭國婆羅門尼拘律陀之胤一名畢鉢羅亦名婆耆子産業豐厚初無係嗣與瓶沙王𥪰富唯讓一犁共摩竭以諍饒更逾千倍積長者之貝玉祈請樹神獲貧女之金珠莊嚴塔像載誕金光之子結成金色之妻果合前緣深符宿願雖為貴偶乃無欲情勤苦出家勳修入道闡一乘而利物弘二教以化人實得他心終無我相大迦葉之應現也爾時賔鉢羅窟藥藏香烟耆闍崛山竹林𥯤水瑞獸游集吉鳥和鳴雅為習定之所正是棲禪之地均佛寶座對蚉拂以談玄換佛珍衣燒象沈而請益一乘正法逾於五歲比丘一覩真容便成八日羅漢啓護之禁不犯戒科畜鉢之道終無捨愔靜以鎮物或掩室而息言寂以凝神或杜口而傳意僧祇劫上初地小於針鎽𠛴那頃閒祥河細於毛孔信心易受遇緣覺而招提𢤱悷難馴對諸天而不語大迦葉之演教也早寤非相見非非相空預覩無明覺無無明盡一坐食則持鉢周天百納掃衣則投針陷地或晨游𣗥冢四念經行或夜宿榛檀六時禮敬貔豹枕後禪心寂而莫驚尫蟒縈前戒定澄而不亂被臰於偷蘭之妹不以為嫌受罵於販針之子不以為辱守極貧極賤處其至卑至微願在萬人之下恥居一物之上三百斛金粟弃之若遺塵九十劫玉顏捐之如脫屣不可為而善者謂之善為不堪忍而能忍者謂之能忍大迦葉之精苦也修阿鞞跋致獲嚴定首楞志崇饒益情規攝養韋陀山上備說良緣光耀林閒對談真相被煙火為喻去法彌傳乘宮殿而行躡空如實不貧母廣現仁慈能度本妻克明貞信帝釋靈化施食充觴梵騰空流泉禮足給淨人之驅䇿平等無偏聞緊那羅揮琴安禪載竦有學於蘭若物我虛澡無欲於檀波色聲具絶八座精進並獲牛軒千弟子之歸依皆乘鹿大迦葉之普濟也既而大地六震驚雷四起入定觀以思惟見人尊之善逝振大法鼓動百億之天人吹大法蠡集三千之部衆歎曰法山崩法海竭法槗壞法舸裂法樹摧法幢折法雲𢿱法炬滅斯乃梵王二請論大而赴之茶毗童子一言停涅槃而待迦葉時佛降七處化六師說佛性之四種開玄法於三德遂令𠜂闍頓須摧心或喻之龜毛或方之鳥跡尋光於海底智者不惻其是非觀樹影於暗中明者不窮其虛實慈緣幽感難陀掩扉而復開願力潛通未羅已燎而還滅四相兼備照菩之五眼千褻俱開現如來之雙足佛曰之日燭耀十方天中之天覆臨三界昔一乘月喻得戒於多子之辭今五指日光剋期於育王之塔大迦葉之冥通也是時優那恍惚聞滅度而悲號彼或愚癡覩泥洹而慶快尊者開銀槨拂金棺以旃檀沈掬香被其體摩訶𦽦陀羅花覆其上添油炷益香薪火不能燒烟不能起尊者訶曰夫出界常身金剛堅固凡俗猛熾何能致焚稽首自請因而火化佛身毀滅惟居香炭之中佛影乘空獨坐蓮花之上灰生四樹用表四含願奉四人俱𪪺四大大迦葉之靈感也是以撥餘燼拾碎身一一腠理以成化佛片片骨節並變寶珠由是天逞天威將欲捧歸於天上神恃神力欲劫持於海下尊者任其樓豆厲聲而唱曰天有力能下地人無力能上天神有靈能出浪人無靈能入海若賫舍利於天海人則永無見期汝等云何欲𩢆凡力違佛本願不遣利人天神乃止憤愧而𨓤大迦葉之任運也尊者乃收舍利分布人天以三十二相全身建八萬四千寶塔群龍頓足拜如來之影像衆獲稽首禮如來之
