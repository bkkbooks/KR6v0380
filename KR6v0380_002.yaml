body:
  text: 第二祖阿難童中流寂滅品第六遂取聖曾集立章品補此卷由缺第十爾時阿難尊者王舍城人也姓剎利帝斛𩚳王子𠀍戚即與佛同氣連枝出家即升堂入室梵語阿難此云慶喜亦云歡喜為佛成道夜生父母歡喜故得嘉名於多劫中而修忍辱性不忤物常出美言情無卒暴多聞博達智慧揔持若海吞流如燈傳照佛智法藏悉在伊人先囑文殊今為近侍阿難乃先求四願允即依隨一者願佛不賜我故棄之衣及餘飲食二者聽我隨佛別請三者諸比丘見佛有時聽我出入無時不須制約四者我至佛前所說經藏重為我說文殊白佛佛讚聰慧阿難善息譏疑皆聽所願二十年中侍奉無逮所有法藏纖豪不遺凡見醜惡未嘗毀呰曾隨如來至一平墅見其穴墓佛告曰何以此墓穴敗無人封樹阿難曰此墳中人心達大道一無所有門不閉塞常覩佛日清虛自在佛讚善哉又至一林見葉凋落顧問阿難曰此林何疏答曰人無寒暑禮儀不生木無榮枯誰知稟氣佛言善哉又於路次見一死犬回問曰此犬甚臰誰能近者答曰雖復臰穢而無臰想其齒白淨甚是可愛𠀍尊重嘆善哉阿難心無毀辱言多贊敬昔金龍尊佛所化功德無量時阿闍𠀍王知其法藏悉付阿難白言仁者昔如來迦葉二師滅度自我多故咸不覩見仁者於後般涅槃時願垂告語阿難曰然即以巡游國土宣暢真宗次第經行至一竹林聞一比丘誤念偈云若人生百歲不見水潦涸不如生一日而得覩見之阿難聞已嗟嘆曰𠀍閒一凡有不解諸佛意徒載四圍陀不如空身睡阿難言已乃語彼比丘曰此非佛偈汝今當聽吾為汝宣偈佛云若人生百歲不會諸佛機未若生一日而能決了之彼比丘聞已即歸白師說阿難所正之偈彼師曰阿難老朽記念非真智慧衰殘言多錯謬慎勿隨之阿難却後依前聞誦誤偈謂曰我曾教汝佛偈何故由念邪言比丘曰我師教招不令棄捨阿難返自思惟人不可言言須得地彼輕我言而諷魔偈佛當在𠀍我即白佛聖已涅槃今向誰說作是念已地六震動須光輝下有一聖宿空中而說偈曰彼者諷念偈實非諸佛語今遇歡喜尊而可依了之前師與弟子聞聖宿菩現身說偈心生恭敬隨順佛語於一食證斯陀含果心自念言吾身老朽不宜久停將入涅槃永歸常樂乃憶阿闍𠀍王與吾盟誓事須相告即詣王宮而語門者為我奏王吾欲涅槃故來辭王閽官曰王當𮄎次覺即奏聞阿難曰然為我陳說即趣毗舍離城恆河岸側王於夢中見一隊仗𢺠從一蓋七寶嚴麗瓔珞殊妙至一寬平處四衆圍繞恭敬供養須之間忽降風雨摧折蓋柄珍寶墜地因此驚覺神情惘然門者奏曰阿難辭王入般涅槃值王𮄎次留言而去王聞悶絶良久乃蘇顧問左右曰尊者當於何處入般涅槃大臣奏曰往毗舍離城王即嚴駕四兵賫持七寶至彼國土見阿難在弶伽中流而住王即瞻仰稽首三界人尊已棄我去暫馮願且莫涅槃毗舍離國王亦奉八珍精嚴三德在弶伽側而說偈言至尊一何速而歸寂滅場願住須間而受於供養爾時阿難以偈辭曰二王善嚴住勿為苦悲戀涅槃當我淨而無語有故阿難復念言我若向一國而𧼈涅槃者諸國持兵而諍舍利殘害他故何名慈慧可於弶伽中流而般涅槃令無爭競作是念已大地山河六種震動時雪山中有一仙人五通具足覩斯瑞應即與五百仙人飛空而至稽首禮足胡跪白言我於當證佛法願為我等而度出家阿難既受請已即化弶伽變作金地為諸仙人如應說法復作是念我昔所受弟子冝當悉集未逾食頃有五百羅漢從空而至為諸仙人出家受戒第一羯磨得初果三法竟得第四果中有二人一名商那和修二名末田底迦亦名末田地迦末田地時度須跋陀羅便證道果云我不欲見師滅度遂先入寂阿難告二第子曰昔如來以大法眼藏付于迦葉迦葉入定而付於我我今滅度用傳於汝汝等二人如法受行流通後世無令斷絶聽吾偈言本來付有法付了言無法各各自須寤寤了無無法阿難又告商那和修曰汝善行化繼聖傳揚汝後有嗣者度人籌盈石室後謂末田地曰如來語汝罽賔國中一百二十年閒有一比丘字末田地迦於彼化道利濟無涯汝當持此正法彼土宣揚我憶如來以諸比丘至彼國土住一大池邊語吾曰我涅槃後有一比丘名末田地迦在此池岸修習禪定彼池龍王深生敬重請於龍宮精陳供養龍乃縮水奉池願充精舍於池西北角別創小池可百餘里龍與眷屬五百自新而居龍因施池尅證那含爾時末田地迦受阿難旨往彼化緣一代光輝師資絶嗣阿難付法藏竟作十八變入風輪奮迅三昧分身四分奉忉利天一分奉娑竭羅龍王一分奉阿闍世王一分奉毗舍離王一分各起寶塔廣興供養自爾雲旋鸖繞梵奏香凝九月四生作禮祈當周第十主厲王十二年癸巳歲矣第三祖商那和修章降火龍品第七爾時商那和修尊者摩突羅國人也亦名舍那婆斯姓毗舍離父名林勝母字憍奢耶於母胎中六年始生亦云商諾迦此云自在服是西天九枝秀草名也商諾迦者初生有自然胎衣隨身而長及後出家化為九條之衣彼國秀草生於淨地若有羅漢出世化為九枝和修出家感斯瑞應昔佛行化至摩突羅國見一青林敷榮茂盛語阿難曰此林地名優留荼吾滅度後一百年有比丘名商那和修於此地上起僧伽藍廣敷法藏大化群生後經百歲果誕和修出家證真林禪思有二火龍毒害猛熾暴物侵人和修即以神力震動此池火龍大瞋霔雨降風興雷掣電和修處慈心三昧安坐怡然龍覩希奇復身禮敬問曰願師慈悲當賜教誨和修曰佛記此地當建伽藍汝捨與吾利益無量龍曰若有教記我敢拒違願師慈憐勿嫌湫隘龍捨地已俱得生天表剎莊嚴播宣聖範和修又自念言我化導已久孰當繼吾入定諦觀見利吒國中有一長者名曰善意而姓首陀當生三子小者出家承襲於我和修乃不賫徒衆獨至彼舍而扣其扉善意一見瞻禮問訊欲何所須和修曰我無徒伴希一給侍善意曰我樂𠀍俗無心出家我若生兒當奉尊者和修曰善即辭而還却歸本座知善意生一子名優波吉羅次生二子一名優波熖摩三名優波毱多柔和善順性好仁慈和修復至善意舍長者見之敬仰倍前和修曰汝先許我子出家今最小者願相給付長者愛心未肻與之和修曰非我創緣昔佛記此子後二百五十年中當第四祖師名優波毱多度人籌𢒈石室汝順佛旨慎勿遮障長者聞宣聖記心意精專即以其兒奉上尊者和修領得歸於寶坊問曰汝年幾耶毱多曰我年十七汝身十七耶性十七耶毱多曰師頭白耶心白耶和修曰我自髮白非心白耳毱多曰我身十七非性十七和修知是法器遂在左右三四年閒師與𩮜度命諸賢而受戒和修乃告曰佛以無上法眼付囑迦葉如是展轉而至於我我今付汝汝當護持聽吾偈言非法亦非心非心亦非法說是心法時是法非心法和修曰汝當善護念諸菩善付囑諸菩無令斷絶吾自歸山深居寂淨汝當化道囑受以時毱多受教禮謝於師和修憶昔罽賔南面有象白山苔石幽奇松泉清峭即飛騰往彼三昧安祥於其定中見毱多五百弟子不重其師心常懈怠是非我難可調伏即至毱多舍便坐毱多牀時毱多不在彼諸弟子咸生瞋怒曰是何弊人踞吾師牀勠力牽挽如山不搖欲出惡言口便閉塞遞相顧遽往告師曰有一比丘形容樵瘁踞師七寶牀安止不伏起毱多念言自非吾師無能坐者即統衆而歸果見是師頭面禮足問訊起居毱多徒衆念言師雖作禮威德勝彼和修知諸孫衆輕慢不悛即舉右手二指點其虛空俄降白乳如膏尋時又降甘露和修語毱多曰汝識此否毱多曰不識和修曰汝審諦觀是何祥瑞毱多即入三昧觀察了不能知乃出定整容而問於師曰是何三昧和修曰此名龍奮迅三昧如是次第有五百三昧名號不同汝曾知不毱多曰我所得法盡從師受唯此三昧未蒙師指引和修曰如來三昧菩不知菩三昧辟支佛不知辟支佛三昧羅漢不知羅漢三昧吾師阿難不知阿難三昧我亦不知今我三昧汝亦不知此三昧者佛涅槃後有其至寂禪定無諸穢意通明定慧心無生滅住大慈力遞相恭敬者方能識此三昧彼五百比丘聞師所說心各戰栗內自悔責云我無智慧輕侮大聖願尊慈悲令罪消滅和修聞已而說偈言通達非彼此至聖無長短汝除輕慢意疾證阿羅漢諸弟子聞已依教奉行皆證道果和修乃呈十八變化三昧火用焚其身所有舍利毱多收葬于梵迦羅山塔崇高顯天樂名華歲盈時降五百弟子各持幡華羅列供養天人禮敬幽顯霑恩當周弟十一主宣王二十三年乙未歲矣弟四祖優波毱多章化三尸品第八爾時優波毱多尊者吒利國人也亦名優波掘多姓首陀父名善意十七出家二十證果佛預記云吾滅度後第四祖師度人無量號無相好佛承商那和修傳付詃諭五天次至摩突羅國大衆雲集半月說法天華時降每地神現見聞獲益震動魔宮波旬𫽄生愁怖乃密騁神通雨真金寶華鬘瓔珞復現寶女窈窕殊麗艷態奇希舉衆攀緣心意慢亂時八千大衆於三日中無有一人而證道果魔王歡喜慶快非常毱多即入三昧乃見波旬致斯妒害退修道衆失其本心魔王見毱多入定即以瓔珞繫於頸上毱多出定即知是魔偶得其便毱多即化三尸所謂人狗蛇等以為華鬘魔時再現舞弄尊者毱多乃軟言慰愈云汝與我瓔珞厚是厚意吾今以少許華鬘聊相酬贈魔王大喜舒頸受之尋變為三尸蟲蛆臰爛穢汙難堪魔王極生猒惡語毱多曰何以死尸繫吾頸上毱多曰比丘之法不應以華鬘莊嚴於人然腐爛腥觸汝之因感何以輒恣妖邪敗吾聽衆汝由不樂何及於我時波旬盡其神力欲解三尸竟不能去乃踊身虛空告諸天衆求解其尸諸天皆言此大聖所加非我能解復詣梵王求免梵王曰十力弟子所作神變我今凡陋何能解之寧以藕𢇁縣須彌山若解此尸終無是處又為說偈俾退本心若因地倒還因地起若無其地終無所履汝可歸心尊者必當為汝解之波旬受梵王教禮敬尊者誓願歸依毱多曰汝於正法更不嬈害不波旬曰我誓回向永歸佛道毱多曰諸聖使我降伏於汝汝因斯故不墯惡道即為解頸三尸魔王大喜敬禮尊者曰我因師故得離邪見毱多曰汝昔覩見如來今還記其容相不波旬曰省毱多曰可謂現之我願覩見波旬曰我見如來形相不敢故辭唯願尊者幸莫禮拜毱多曰然波旬即入林中變為如來三十二相八十種好面如滿月身若金山進止威容釋梵圍繞從林而出毱多一見生如來想瞻奉化容忘與魔約不覺禮拜魔王不勝致敬身體戰掉却復本形而說偈言稽首三昧尊十力大慈父我今願回向勿令有劣弱言訖拜辭尊者却返天宮至第四日告諸天衆曰欲得人天利樂永離蓋纏當數往毱多法會飲啖醍醐言已即率天衆賫持香華伎樂而來供養時毱多在𠀍化道證正尤多單賢隻聖罔記其倫夫婦俱證道果者方折一籌籌長四寸滿一石室室長十八肘廣十二肘最後有一長者名香衆來詣出家師曰汝身出家心出家香衆曰我來出家非為身心師曰不為身心復為誰出家香衆曰夫出家者無我我故無我我故即心不生滅心生不滅即是常道既是常道諸佛亦然心無形相其體亦然毱多曰汝當明寤心自通曉宜依佛法紹隆三寶即與出家命聖受戒乃告曰昔如來以大法眼藏囑纍迦葉如是展轉而至於我我今付汝汝善保持傳化未來無令斷絶聽吾偈言心自本來心本心非有法有法有本心非心非本法說此偈已復告香衆曰汝父夢金日梵云提多迦此云通真量冝名提多迦以符冥貺提多迦聞師賜名并傳法偈頭面禮敬頂謝再三毱多乃騰身虛空作十八變使諸四衆發大信心却座儼然洎乎長往大衆以室內之籌用闍維之悉得充足提多迦即收舍利起塔供養四衆萬靈晨夕香唄當周第十三主平王三十一年庚子嵗矣第五祖提多迦章仙受化品第九爾時提多迦尊者摩竭陀國人也在舍之日父夢金日從屋而出放大光明照曜天地對一大寶山山頂有泉師為解曰寶山者吾身是也放大光明者汝智慧也從屋出者汝入道也山頂泉者無上法也毱多為釋其夢并賜其名而度出家兼付法藏提多迦歡喜踊躍而說偈言巍巍七寶山常出智慧泉回為真法味能度於有緣毱多聞已亦說偈言我法傳於汝當現大智慧今日從屋出照曜於天地提多迦聞師說偈禮敬奉持自統其徒化游諸國至中印土彼國有八千文仙化誘人衆仙尊號遮迦廣行仙道聞師演範即領諸仙衆至法會所瞻禮聽受乃語尊者曰我憶往昔與師同生梵天我學仙道遇阿斯陀受我仙法尊者修習禪定今證聖果自須支離已經六劫提多迦曰適見仙尊已知遠事我得證汝獲奚方仙曰我於仙道唐設劬勞捕影繫風乘空躡響流浪多劫一無所得尊者曰佛云人修大仙功德無緣敬學小道又似纏牽佛說如此汝可捨之如棄小流而歸大海宜捨仙道而入佛乘我化道已久竟不在晚仙曰阿斯陀仙記我却後六劫當遇同學而度於汝得證聖果今此際會願度出家時八千人見仙尊捨道從師心皆憤悱曰大仙何故而歸小尊不間呪術而無道藝削髮披緇有何能勝我等雖順大仙心未降伏提多迦知諸仙衆我慢貢高即作神通放大光明足履虛空如地無異時現寶蓋而覆其頂手生五乳二乳中涌出蓮華二華中而現諸佛為說妙法仙衆見已發菩提心禮敬尊者俱願出家師曰汝既回心聖必加護各應自念非假刀剃可至誠歸命三寶自成聖相諸仙受教各自念佛專心靜慮應時鬚髮自落袈裟被體檀相如畦悉登法忍提多迦仍為說法咸證無生然命上首弟子彌遮迦曰昔如來以大法眼藏付囑迦葉展轉相傳而至於我我今付汝汝善護持聽吾偈言通達本法心無法無非法寤了同未寤無心亦無法說是偈已即從座起踊身虛空現十八變作六神通化火光三昧而盡其體彌遮迦收其舍利於斑荼山中起塔供養當周第十五主莊王七年己丑歲矣第六祖彌遮迦章除觸器品第十爾時彌遮迦尊者中印土人也昔為大仙統八千衆五天大化四衆須誠遇提多迦而憶往事出家受教繼祖傳燈遍化群方弘宣法眼至北天竺國遠望城上金雲偃仰覆蓋雉堞尊者曰此城內有大乘氣必有竒人而紹聖種言訖即入此城路逢一人身服嚴淨手執酒器來問師曰何方而來欲往何處師曰自從心來欲往無處又問曰識我手中物不師曰此是觸器而負淨者又問曰識我不師曰我即不識識即不我師曰今雖識汝不知汝字汝暫稱名吾即省矣彼曰我今生此國復憶昔時本姓頗羅墯名婆須蜜師聞姓字洞徹宿緣我師提多迦云昔佛游北天竺國謂阿難曰此國中有一大聖吾滅度後三百年當出于𠀍姓頗羅墯名婆須蜜於禪祖中當于第七𠀍尊記汝非吾能知汝可出家捨除觸器而證解脫婆須蜜聞已即擲飲器禮請於師云我適憶往事於無量劫中曾施寶座值於一佛與我受記云於賢劫中得繼玄範次當第七如𠀍尊所說深叶宿緣願師大慈引接至道師即與出家命聖受具然告曰昔如來以大法眼藏付囑迦葉如是展轉而至於我我今付汝汝可護持聽吾偈言無心無可得說得不名得若了心非法始解心心法師曰吾此偈者祕密心要法可諦思勤行覺道言已即於座上現奮迅三昧於虛空中從無相入有相出有相入無相出乃成八支道却至本座化火焚軀人天感慟雲霧慘悽婆須蜜收取舍利以七寶函盛安塔上層人天龍神供養無虧當周第十八主襄王十七年甲申歲矣第七祖婆須蜜章梵王問品第十一爾時婆須蜜尊者北天竺國人也姓頗羅墯在彼國中或風或狂乍愚乍智手執酒器游佚四衢值彌遮迦明宣往事承佛遠記隨順出家受道傳輝殊方誘化至迦摩羅國大興佛事忽於座前有一智者稱佛陀難提起白師曰解論議不師曰仁者論即不義義即不論若擬論義終非義論佛陀難提聞師語勝心即敬伏即告師曰我願求道服甘露味唯冀慈悲而賜攝受尊者即與披剃命諸羅漢而為受戒然後告曰昔如來以大法眼藏囑纍迦葉如是展轉而至於我我今付汝汝善護持聽吾偈言心同虛空界示同虛空法證得虛空時無是無非法說此偈已踊身虛空逞十八變化以慈悲心三昧而入寂定令身不𢿱儼然如生經于七日梵王諸天而來座前禮敬而說偈曰賢劫衆聖祖而當第七位尊者哀我念請為宣佛地尊者聞梵王請即從座起告梵王曰我所得法而非有故若識佛地離有無故說此語已依前入定梵王聞師說法讚敬殷勤𢿱諸寶華繽紛供養佛陀難提即從本坐起窣覩波時有一王名法莊嚴捨身所有瓔珞真珠而用莊嚴七衆巡繞當周第二十一主定王十九年辛未歲矣第八祖佛陀難提章白光通貫品第十二爾時佛陀難提尊者迦摩羅國人也姓瞿曇波初生之時頂上有珠珠光遠照年四十聰明博達日唯一食常修梵行遇婆須蜜行化而往徵詰聞師如辨遂投出家復承法嗣援引導衆門闡範遐邦至提伽國彼國之人多修定業有一毗舍羅家唯生一子名伏馱蜜多年登五十而不解語又所履步喻若孩𡦗父母常懷憂慮嘆曰是何因緣産生疣贅誰有智者為我訣疑乃問諸定者為是何因定者云我但習定是事莫知後有智人當為汝釋此智者心懷佛印身意清淨善有他心及以宿命若要除疑當俟彼至佛陀難提即入此城届於彼舍上見白光貫霄漢師問衆曰識此光不衆曰匪知師曰今此俗舍當有聖人心如大海不合凡意口無言說是大乘器不行四衢知觸穢耳當繼吾跡人天獲利此光上下通貫者亦有所以上通至天者吾所學者而出於彼下貫者吾數當第三師名脅尊者其行高廣五天欽崇說法度人不可稱計言由未已彼舍主出禮問尊者曰有何所須師曰我來求人不須其物蜜多父母曰我身老朽不堪出家唯有一子而復愚癡若要財寶供給不辭定覓其人多應罔遂師曰我來求人不須其寶但得其人珍寶自至父母曰我有一子年已五十未解言語亦不行步師意若要我即不惜師曰如汝所言便將與我父母即將此子奉上尊者尊者領得歡喜內盈至伽藍蜜多忽然自進七步合掌師前而咨問曰父母非我親誰是最親者諸佛非我道誰是最道者尊者觀行復語已是竒聆問幽深倍常欣慶即以偈答曰汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似若識汝本心非合亦非離蜜多聞師說偈敬奉彌勤即請出家師為度脫命聖具戒乃告曰昔如來以大法眼藏付囑迦葉如是展轉而至於我我今付汝汝善護持聽吾偈言虛空有內外心法亦如此若了虛空故是達真如理伏馱蜜多聞師偈已即從坐起踊身虛空灑諸甘露雨𢿱天華說偈讚曰我師禪祖中當得為第八法化衆無量悉獲阿羅漢時佛陀難提即從座起卓然而立現五神通從其腹中光飛八道照曜大衆承此光者五百餘人悉證三果師方入滅高樹寶塔插入星河梵衆人天香華供養當周第二十四主景王十二年丙寅歲矣長安終南太一山豐德開利寺譯經沙門雲勝游禮賢行借忘苐二第十二卷咸平元年上表乞續編人開元年智升撰録後來唐玄肅代德四朝七人三藏所翻并聖朝四人翻譯并聖製三藏集傳一千餘卷今取聖智集補之第十以上原缺三行半第九祖伏馱蜜爾時伏馱蜜多提伽國人生已來年近五十都不行履亦不解語彼國之人多修定業父母詣彼而欲語之說云因緣以何之故而生一子不解行語年近五十漸積癡老如何定者而為決烈定者曰我自唯定非能知諸當有智不久而至此大士心懷佛印身亦清淨善有他心而知宿命若欲決烈候彼問之爾時佛陀難提便入此城游行教化說諸大衆而至毗舍羅家時彼父母同至尊前頭面作禮尊者見此宅上有一白光上下通貫而謂諸衆識此光不衆曰我不能識唯師所辨爾時佛陀難提告諸大衆今此光者於此俗舍當有聖人心如大海不合凡意口無言說其行常異靜心寂然是大乘器不行四衢知觸穢耳吾滅度後有此聖者而繼嗣之度諸羅漢而滿五百化道群有悉獲聖果父母禮已問佛陀難提曰所須何物尊者曰我來求人不須其物多父母白佛陀難提尊朽不以下缺一紙半曰我住此處與得生惱爾時香蓋知子志意而求出家其父白師云我此子欲住師所願師納受為與濟度爾時尊者即與出家有七羅漢而為受戒於戒壇中而現一相天雨舍利三七粒亦受戒已舍利亦隱時比丘難生在師左右常坐不臥而心精進爾時伏馱蜜多告比丘難生曰如來以大法眼付囑迦葉展轉相傳今至於我我今將此正法眼藏付屬於汝汝當護持無令斷絶汝受我教而聽偈言真理本無名因名顯真理受得真實法非真亦非僞爾時難生聞說偈已心勤恭敬而受詔爾時伏馱尊者付法已竟又自念言化導已久於諸本緣悉皆度盡我自三昧而自安息作是言已默然入定天諸音樂而供養之時脅尊者即以香薪用闍維之收得舍利於一寶坊號爛那多而於此所超塔供養此師入寂時當此土姬周第二十六帝敬王三十五年甲寅之歲伏馱蜜多涅槃也第十脅尊者章預感金地品第十四爾時脅尊者中印度人也在母胎中六十年耳雖食五穀而復無漏欲生之時父夢白象背有花座於此座上而有一珠此象負之從門而出至一法會瞥然不見從此夢已其子已誕身有香氣光明滿室唯有一仙而辨此瑞謂父母曰汝所生子非是俗器當遇菩而見濟度爾時伏馱蜜多與諸大衆至中印度大作佛事是時香蓋即領難生至其師所時難生一見伏馱尊者便生敬慕欲求出家其父報曰汝若出家常在師所我若住此汝即歡喜吾歸彼舍汝必生惱子曰我住處與彼不殊諸漏已盡何已生惱爾時香蓋知子志意欲覲師所而求出家其父白師今我此子欲依師法願納受之為我濟度爾時伏馱即與脅尊者出家有七羅漢而為受戒於戒壇中而現一相天雨舍利三七粒亦受戒已舍利亦隱爾時脅尊者在師左右勤心精進常行苦行脅不至席因茲立名於彼國中而為其首得付法已游行教化至一國土名曰花氏彼國土中有一長者名曰寶身而有七子一名富那般多二名富那金子三名富那月光四名富那勝童五名富那波豆六名富那吉丹七名富那夜奢其第一子常好仙術多諸伎法其第二子常好寂靜每思善事不欲喧閙其第三子常好打險之戲以為快活其第四子常行布施專好念佛其第五子唯敬殺害心好酒肉其第六子好行淫欲不以為猒其第七子心無所求亦不好樂亦不憎惡亦不作罪亦不求福亦不生滅亦不居靜亦不處亂亦不求道亦不求佛亦不求解脫亦不求菩提不求聲聞及辟支佛自云我心所得咸獲生滅我心所證亦復然矣若遇大士而坐道場我至彼所親近隨喜時脅尊者至彼國中於一樹下與諸大衆俱會一處爾時尊者以手中指指樹下地告大衆曰此地若變為真金色當有聖者而入此會言當未久其地漸變須之頃以為金色尊者舉首而見一人當會前立尊者曰汝從何而來夜奢曰我心非往尊者曰何處所住夜奢曰我心非止尊者曰汝不定耶夜奢曰諸佛亦然尊者曰汝非諸佛夜奢曰諸佛亦非爾時脅尊者心生歡喜諸佛慈造衆聖不絶度諸有苦咸登覺場即說偈言歎夜奢曰此地變金色預知於聖至當坐菩提樹覺道而成已爾時夜奢而說偈言用歎師曰師坐金色地常說真實義回光而照我今入三摩諦說此偈已禮師白言我今欲出家尊者當濟度爾時尊者即為出家請諸羅漢而與受戒爾時脅尊者告富那夜奢曰如來以大法眼付囑迦葉迦葉展轉相傳而至於我我今將此正法眼藏付囑於汝汝可流布無令斷絶汝受我教而聽偈曰真體自然真因真說有理領得真真法無行亦無止說此偈已告曰汝善守護勿令斷爾時富那夜奢受尊教已作禮圍繞以諸花香而𢿱其處時付法已即從座起合掌當心涌身虛空化火三昧而自焚𤑔須之頃空降舍利大衆以衣而共盛接安立塔廟六時恭敬又梵天人而持一蓋七寶莊嚴將奉塔上而為裝飾自脅尊者入寂時當此土姬周第二十八帝貞王二十二年己亥之歲涅槃也第十一祖富那夜奢章察馬鳴品第十五爾時富那夜奢者花氏國人也姓瞿曇氏兄第七人而處最幼心明博達無諸所求復於諸有而不繫箸心如大海智若須彌而感師故縣知來矣師統大衆而止一樹又已中指指樹下云此地變如真金色當有聖者而入此會言猶未已其地漸變如真金色師忽舉首而見尊者當會而立脅尊者曰汝何而來夜奢曰我心非往尊者曰何處所住夜奢曰我心非止尊者曰汝不定耶夜奢曰諸佛示然尊者曰汝非諸佛夜奢曰諸佛亦非爾時脅尊者心生歡喜諸佛大慈造令衆聖不絶度諸有衆故咸歸佛道場爾時尊者即與出家命諸羅漢而為受戒即付其法并說其偈教詔守護無令斷絶時富那夜奢得付法已廣宣流布他方游化而教導之十力功德悉皆具足八解三明無不委知大行高廣而自安樂說法度衆而滿千萬得道果者而有五百次第游化又至一城名波羅奈遇一長者名曰馬鳴有大智慧心行佛事於諸有故而能調伏爾時尊者顧視左右而發問曰汝等諸人者知此來士而已識不衆曰非我等知夜奢告曰今此來者不是餘衆昔聞聖說佛已受記吾滅度後六百年中當有聖者而號馬鳴行步威德𢒈㒵端正於波羅奈而自出現彼出家後而至花氏說法度衆而滿三千摧伏衆魔而壞邪見因此起信而造其論當後𠀍中而悉致敬夜奢曰此之來者合其事已何者吾於昨夜夢見大海當於一隅吾欲決之此水奔流而潤沙界令此來者即是大海吾與出家有潤含識說此事已馬鳴至前合掌當心而白尊者我欲識佛何者即是夜奢曰汝欲識佛不識者是馬鳴曰佛既不識爭知不是馬鳴曰此是鋸義夜奢曰彼是木義夜奢又問曰鋸義者何馬鳴曰共師乎出又馬鳴問曰木義如何夜奢曰汝被我解爾時馬鳴聞師義勝心即歡喜而求出家爾時衆中達此義者二百人俱悉獲羅漢於此會中共度馬鳴而受戒品爾時富那夜奢告鳴曰汝知先𠀍昔事以不馬鳴曰我昧如夢請師為決夜奢曰汝先𠀍中曾生梵天而為愛故生毗離國中人無衣服身生其毛猶似其馬雖有其口不解言說汝興慈故而化小蟲分身萬億於彼樹上而食其葉不經旬日而有窠圍彼國人衆而有三等最上之者身有光明而能言說所念衣服而能自資中等人者身無光明自求衣服最下之者身形如馬號為馬人於此樹上拾其窠圍將充衣服此窠圍者彼號天子衣即此土蠶子是也因此一國馬人而充衣服為獲此利而生中國昔離彼國馬人感故而共鳴喚汝心感故而說偈曰我昔生梵天為有小愛故而墯毗離國與汝同憂苦我見汝無衣心生善報護示化於窠圍當得諸濟度說誦此偈已便生波羅奈汝合轉法輪次第當十二因此所感故號於馬鳴又告曰如來以大法眼付囑迦葉展轉相傳而至於我我今將此正法眼藏付囑於汝汝可流布無令斷絶汝受我教當聽偈言迷寤如隱顯明暗不相離今付隱顯法非一亦非二時馬鳴尊者聞說偈已心生恭敬頂戴奉持時富那夜奢付法已竟即現神力飛行自在作十八變訖却至本座而入寂定時當此土姬周第三十三帝安王十四年戊戌之嵗入涅槃也第十二馬鳴菩章現日輪品第十六爾時馬鳴菩波羅奈國人也爾時𠀍尊與諸聖衆而至此國謂諸衆曰吾滅度後六百年中當有智者號曰馬鳴而於此土為化導首後至花氏度諸外道而滿三千見彼起信而造其論此人先𠀍曾生梵天而為愛著墯毗離國彼國三衆而各有異於最下者身無衣服不解言語上彼二衆號之馬人當此人者曾化天衣而覆此衆窠圍蠶薾之所等物為此善利而生中國後傳我教次第十二行步威德𢒈㒵端正當出毗離感馬鳴故故號馬鳴亦名功勝於諸功德而獲最勝爾時馬鳴得付法已游行教化又至他土名曰花氏於此國中常演妙法度三乘人有一老者云我病疾於馬鳴前以面覆地後便不語衆者所怪云是何物當於會前而伏於地爾時馬鳴告衆人曰此非凡者不久之間而現異相語猶未訖早已不見須之頃從地涌出身如金色化為一女其端正手指尊者而說偈言稽首長老尊當受如來記今於此地上而度生死衆說此偈已瞥然不見爾時尊者心自思惟必有魔至與我論義今此賢聖而預境界爾時尊者為衆說法須食須有大風雨尊者曰此是魔作若我不除必當興害爾時馬鳴以手揮空現一金龍身長千尺復更雷電回風大雹以吹彼衆此即安樂須之須魔即𨓤𢿱又經七曰是時魔等化一小蟲至尊座上爾時馬鳴以手捉得謂諸衆曰識此蟲不衆曰非我所惻尊者曰此是魔王而盜聽法尊者縱之住作神變彼魔力小而不敢動尊者曰汝現本身我非汝爾時魔王即現本身禮尊者尊者問曰汝之眷屬有幾多衆答曰有三千衆又問曰汝之名字復號云何答曰我號迦毗魔羅尊者曰汝有何聖答曰我化大海不足為難尊者曰汝化性海當可得不迦毗魔羅曰非尊不才我當未得爾時馬鳴即以說法并現神力大地振動發三昧火而照天地爾時毗羅見現神力心即起并三千衆而亦起信爾時馬鳴既見伏已即度出家於大衆中告毗羅曰汝發菩提當得聖道不久獲果汝非覺知爾時毗羅心淨恭敬未久之頃有五羅漢當為證果身則輕健而得其戒異香遍覆大衆咸知時有光明身中而出爾時尊者馬鳴告毗羅曰如來以大法眼付囑迦葉迦葉如是展轉乃至於我我今將此正法眼藏付囑於汝汝可流布無令斷絶汝受吾教當聽偈曰隱顯即本法明暗元不二今付寤了法非取亦非棄爾時毗羅尊者聞說此偈心生辨重而依教囑爾時馬鳴付法已竟即於本座入奮迅三昧現神通已即於座上卓然而立化為一相猶如日輪良久即隱而入大寂時當此土姬周三十五帝顯王三十七年甲午之嵗入涅槃也第十三祖毗羅尊者章他心知疑品第十七爾時毗羅尊者花氏國人也於彼國土而隱陰界時現風雨常作外法有所仰衆而僅三千爾時馬鳴菩游行教化至彼花氏於一樹下常演妙法以度諸衆令得解脫時有一人年似衰老至尊座前云我疾病覆面在地良久不動更不言語大衆共𪫦云是何物爾時馬鳴告大衆曰此非凡人不久之閒當有變異語猶未訖早已不見須之頃從地涌出化為一女身如金色以手指尊者而說偈語稽首長老尊當受如來記今於此地上而度生死衆說此偈已瞥然不見爾時馬鳴尊者心自思惟若觀此相必有魔至於此地上當得成道而此魔衆於我道場徵責往覆而必持論即降風雨或現小蟲盜聽我語爾時馬鳴為衆說法須之頃有大風雨尊者告衆曰此是魔作我若不除必當興害爾時馬鳴以手揮空現一金龍身長千尺復降雷雹回風電卷以吹彼衆此不覺知須之頃魔即𨓤𢿱後經七日是彼魔王作一人蟲其𢒈小至尊座上盜聽其語爾時馬鳴以手捉得謂諸衆曰非我所惻尊者曰此是魔王而盜聽法是時尊者而乃縱之彼魔力小而不敢動尊者曰汝現本身我非汝爾時魔王即現本身禮覲尊者尊者問曰汝之眷屬有幾多衆答曰有三千人又問曰汝之名字復號云何答曰我號迦毗魔羅尊者曰汝有何聖答曰我化大海不足為難尊者曰汝化性海當可得不迦毗羅曰非尊不才我當未得爾時馬鳴即以說法并現神力大地震動發三昧火而照天地爾時毗羅見現神力心即信伏并三千衆悉起信心爾時馬鳴既見伏已即度出家於大衆中告毗羅曰汝發菩提當得聖道不久獲果汝非覺知爾時毗羅心淨恭敬未久之頃有五羅漢當為證果身則輕健而得其戒異香遍國無不知悉時有光明身中而出爾時馬鳴即付寶藏并說其偈爾時毗羅尊者得付法已至西天笁國化導群品有一太子名雲自在領諸徒衆而至道場欲請尊者宮內供養尊者曰佛法不得親近國王王子諸朝宰等爾即樂後必有怖太子曰我國土中有一大山多諸惡鬼并毒龍等彼有道者心多藝術此山方廣近五百里於此山南而有一窟毒龍居中非入所止尊者意不近人當於所止甚是寂靜而可安道爾時毗羅尊者即往彼所欲至山所有一大蛇從山而出來逆尊者尊者見已身長一里其眼如日尊者便往亦不𮨇視行至山南住一平處其蛇亦來至彼盤繞尊者端然而不傾動其蛇却解尋入窟穴尊者回顧左右人衆無一住者盡皆𨓤𢿱又至須有一老人從窟而出白尊者曰欲居此不尊者問曰汝是何人當居此窟老人曰我居此山以經千嵗奉上尊命而配住此尊者問曰於此山內更有何人是修道者我欲知識老人曰從此行去直至於北十里已來有一大樹覆陰多龍近有五百中有一人名曰龍樹心樂正法曾近諸佛常修梵行化諸龍王漸得道果我亦敬仰而師於彼尊者欲識而當往之爾時尊者便往至彼龍樹一見心生歡喜禮拜尊者合掌問訊深山孤寂龍居窟穴尊者至聖何因降此尊者曰慕道非深得人在遠我非至聖而覲賢者爾時龍樹欲求出家心自念言此師聖不爾時毗羅尊者告龍樹曰汝雖心語我已知之但自出家何慮吾聖爾時龍樹依師學道至求出家是時毗羅尊者而度龍樹時大國王悉皆在會感天帝釋降下香乳并諸梵衆而𢿱天花國王施惠利甚厚又得羅漢而受禁戒當獲聖果而得神通爾時毗羅尊者告曰如來以大法眼付囑迦葉迦葉展轉相傳當至於我我今將此正法眼藏用付於汝汝當護持物令斷絶汝受吾教而聽偈言非隱非顯法說是真實際寤此隱顯法非愚亦非智是時龍樹聞師偈已心生歡喜頂戴奉持時毗羅尊者付法已竟即從座起涌身虛空現十八變訖化火焚身而歸寂滅爾時諸天并諸大衆各持瓔珞奉上塔廟又𢿱天花而遍其地爾時毗羅尊者入滅當時此土姬周三十七帝𧹞王四十一年壬辰之嵗般涅槃也第十四龍樹菩章辨天戰品第十八爾時龍樹菩者西天笁人也當學道時居一大山名曰龍勝此山之中多諸毒龍時毗羅尊者而降於彼先遇太子名雲自在欲請歸宮而不受之又至一山名曰龍勝於此山中而見一蛇其蛇長大近有一里漸近毗羅其眼如日尊者所見而似夢之既到山已其蛇亦至盤繞尊者而得數匝是時尊者心不傾動如須彌山其蛇漸解而歸窟穴須之頃現一老人從窟而出白毗羅曰欲居此不毗羅問曰汝是何人當居此窟老人曰我昔𠀍中曾為比丘於一林野多樂寂靜有諸道衆時來問我我心煩燥不樂言說意有瞋彼天罰我當作一蛇長四百步朝所出者即是我身當住此山已經千歲尊者曰於此山中更有何人是修道者我欲識之老人曰從此行去直至於北十里以來有一大樹陰覆多龍即此樹王名曰龍樹彼樹王者心樂正法曾於昔劫而覲諸佛化諸凡等常修梵行而度彼衆漸得道果我亦宗仰而師於彼尊者欲識當冝往之爾時毗羅尊者疾步至彼龍樹一見心生歡慶而自歎訝何得聖者迂臨而至作禮圍繞𢿱龍金錢合掌當心而問訊曰深山孤寂龍居窟宅尊者至聖何因降此尊者曰慕道非深得人在遠我非至聖而近賢者爾時龍樹欲求出家心自念言此師聖不爾時毗羅尊者告龍樹曰汝雖心語我已知之但自出家何慮吾聖爾時龍樹聞師之言心即驚異便求出家依師善法至近佛道是時毗羅尊者而度龍樹天笁國王悉在其會時感天帝降下香乳并諸梵衆而𢿱天花國王捨施惠厚珍寶又感羅漢而與受戒當獲聖果而得神通爾時毗羅尊者便付法藏彼受教詔而為說偈爾時龍樹得付法已心生欣慶涌身虛空遍至他國作神通已却復履步至一國界名南印度彼國人民多信福業而不會佛真如至理唯行小辨不具大智及問佛性而但布施云我求福非解佛性汝會佛性而為我說爾時龍樹菩告彼衆曰汝欲學道先除我𢢔心生敬仰方得佛性彼衆曰佛性大小龍樹曰非汝所知非說大小若說大小即是大小非佛性也彼衆曰我於菩欲求其理而棄小辨歸于大智爾時龍樹即為說法對諸大衆而現異相身如月輪當於座上唯聞說法不見其𢒈彼衆之中有一長者子名曰提婆謂諸衆曰識此瑞不衆曰非其長聖誰能辨耶爾時提婆心根宿靜亦見其相默然契會乃告衆曰今此瑞者師現佛性非師身也無相三昧𢒈如滿月佛性之義語猶未訖師現本身座上說偈曰身現圓月相以表諸佛體說法無其形用辨非色聲爾時彼衆聞此偈已心各踊鋭便求出家爾時龍樹而即度脫并與命聖而為受戒合會大衆悉獲解脫於中提婆而為上首爾時龍樹菩化彼國土時五千外道作大幻法令王敬仰是時王者深信其事宗事外道却惡佛法云彼是時龍樹改其容儀著白褻衣手執赤翻在王前行覓即不見不覓即現如是隱顯經于七年王苦怪問汝是何人在吾前行時隱時顯經于七載龍樹曰我是智人善知他事王聞此語甚大驚愕王曰汝自云智人以何驗之龍樹曰王自知者宜當試之爾時大王俯仰問之諸天今者當何所為龍樹曰諸天今者與修羅戰王曰彼是天事此復難明龍樹曰但待須即當有驗語猶未訖干戈戟矟降下如雨耳鼻腳手從空而落王見是事特生珍敬命彼外道令禮龍樹是時道衆同見斯事深共歎訝爾時龍樹菩為彼諸來宗衆而說大智度論今現行於𠀍故不録焉并造中論誦四百餘偈又造十二門論此三本論廣明佛理而濟道牙立勢摧耶備開宗要亦行於𠀍故不書之爾時龍樹告迦那提婆曰如來以大法眼付囑迦葉如是展轉乃至於我我今持此正法眼藏付囑於汝汝當受教諦聽吾偈偈曰為明隱顯法方說解脫理於法心不證無瞋亦無喜爾時迦那提婆聞師付囑并說其偈心自慶幸而受教詔爾時龍樹告提婆曰汝善護持勿令法眼斷絶為未來𠀍廣度群品作大佛事令得解脫爾時龍樹付法已竟即於座上涌身虛空入月愛三昧現神變已却歸座上而入禪定至于七日天雨舍利復從定出以手指空謂衆人曰識此事不衆曰我不能辨非聖可知龍樹告曰此舍利者是拘那含弟子摩訶迦尊有其宿願而發三等第一願者我作佛時有聖化度遇天雨下到其身上悉為舍利以表其瑞第二願者地所生物而堪為藥諸衆生第三願者所有智者令智高廣而知宿命言訖入定寂然長往時當此土𥘿苐四帝始皇三十五年己丑之嵗入涅槃也第十五祖迦那提婆章興百論品苐十九爾時迦那提婆者南印度人也姓毗舍羅昔求福業而學小辨因遇龍樹而寤大智爾時龍樹告迦那提婆曰欲學其道先除我𢢔心生敬伏方入佛海而見道性智慧明朗於諸見中常獲第一是時迦那提婆心即悚栗與諸大衆虔誠宗奉爾時龍樹即為說法提婆曰我於菩欲求其理棄于小辨歸乎大智爾時龍樹即為說法對諸大衆而現異相身如月輪當於座上唯聞說法不見其形彼衆之中唯有提婆知其宿命而能辨了提婆為衆人曰識此瑞不衆曰非尊不才提婆曰今此瑞者師現佛性用以表之說法無形聲色都寂議猶未訖師現本身座上說偈曰身現圓月相以表諸佛體說法無其相用表非色聲爾時提婆等聞此偈已心各誦𨦣便求出家而師龍樹爾時龍樹便度出家并為命聖而為受戒合會大衆皆獲解脫提婆於中最為上首爾時龍樹菩為彼衆故而說大智度論并撰中論誦四百餘偈又造十二門論廣明佛理而濟道牙立勢摧邪備開宗要盡行於世故不録焉爾時迦那提婆得付法已擅步諸國建立勝幢降伏異道以智慧力斷諸邪見化度群品游歷他土又至一國名迦毗羅於此國中有一長者財富無量而有二子一名羅睺羅琰二名羅睺羅多爾時長者而姓梵摩復名淨德於一居舍好持園𮏑修理平正多諸花藥及其雜樹於衆樹中而有一樹陰茂多衆於此樹上而生一耳大如車輪唯供長者之所食噉諸有眷屬悉不獲之此二子問父覓食欲知此耳氣味何以爾時長者即至樹所擬取其耳揔皆不見回語子曰此樹耳盡欲至食時其子自取亦皆不遇又此二子醉酒而臥其父欲食其耳即出以充飽食食既足已亦無餘者又諸家衆而擬盜取至彼樹上亦不復見爾時長者心自念言我何因緣而食此耳甚是甘美餘人無分又曰天生竒耳非有命者依樹而生亦須有分若無分者不得食之誰有聖人而能知故爾時長者作是語已其第二子至彼樹所見此樹耳懊惱前後我不得今此見者悉皆屬我即使左右而修理之以充一食其子食已亦無餘者心即安樂不同前後身得輕健心不卆其次二子而向兄說兄既聞已亦命人取都不見有除第二子及其長者即得食之餘所求者悉皆不獲父子二人自思念之家千口餘揔不得食唯我父子而食樹耳故知此事必非常水有人決得我從所使第二子曰此木生竒耳我食不枯槁智者解此因我回向佛道爾時長者與子歎已至於園觀𢿱步游行是時提婆教化諸衆當會前立白大師曰佛授記云吾滅度後二五百年中有大菩因耳而寤若出家時當有聖者而謂證果當在一國中名羅睺羅多吾於此土化而故接此衆言已又與大衆巡行城邑至梵摩家是時長者深生敬重而供養之即於尊者而說此樹請解本因復緣何以爾時提婆即於座上而入三昧觀其昔緣須之頃却從定起告長者曰汝年二十時供養一比丘及此第二子亦為侍衛者合家諸眷屬而悉不樂見唯父與小子心常生敬慕此維佛第子而無道德之外相有節行心不通大理在汝此家舍而經三十年從此滅度後而作此樹耳為有少節行不繫諸惡業為受此供養故來填酬爾是時尊者問長者曰汝年多少梵摩淨德曰已年七十九爾時提婆菩以偈記曰入道不通理覆身還信施汝年八十一此樹亦無耳爾時淨德及第二子聞師說偈心開意寤同白師曰我欲出家身已老朽其子年少而樂入道并有宿願故今復當其時願師哀納我其父亦聽許爾時提婆心思佛記却問其子汝名云何答曰我名羅睺羅多尊者曰天生佛記非我能為汝若出家必大果報爾時提婆即與出家命諸大衆而與受戒領行化導游諸魔所彼外道等第相謂曰此所來者當伏於我各各用心而共持論彼衆我寡宜共齊力爾時提婆至彼立已手執一翻其翻八尺竿長丈二於彼而立敬不移步外曰汝何不前師曰汝何不後外曰汝似賤者師曰汝似良人外曰汝解何法師曰汝百不解外曰我欲得佛師曰我灼然得外曰汝不合得師曰元道我得非汝所知外曰汝既不知云何言得師曰為汝我故所以不知我無我故自當得佛時諸外道咸相謂曰此大聖者而號提婆曾於我衆而久調伏宜可就彼宗仰歸依于時外衆而悉敬伏又發大問一千九條尊者所答悉不失地二五十衆咸𡋐道場對答六疑而興百論得神通力周遍十方大建法幢摧邪顯正爾時提婆菩告羅睺羅多曰如來以大法眼付囑迦葉如是展轉乃至於我我今將此正法眼藏付囑於汝𠀍尊記汝佛滅度後二五百年中有大菩羅睺羅多汝宜傳授無令斷絶受吾教誨而聽偈言本對傳法人為說解脫理於法實無證無終復無始爾時羅睺羅多聞說此偈并付法已心生敬重而順教詔師付法竟即從𡋐起入奮迅定分身八布而歸寂滅時諸梵衆起溚供養用諸寶翻而縣其上細妙雜玲裝挍嚴飾而遍其處自此師滅度時當前漢第四主文帝十九年庚辰之嵗入涅槃也第十六祖羅睺羅多章取甘露品第二十爾時羅睺羅多者迦毗羅國人也姓梵摩父名淨德本因樹耳有多願故若有智者為我解說知其往事我即恭敬回向佛道不久之頃當遇提婆而為入定白其前事不𦍬宿願而便出家師將化緣游至魔所廣立其義手執勝憣足理堅䚕口談千論心思萬義宗生有之宗從立無為之至理于時外魔崇敬伏至聖於迦毗顯揚真乘會萬機於香域然則不生不滅知者見者乃達於本原無去無來會者則方持於覺路是時羅睺羅多之大士持法印而化迷徒六通以獲於前緣三明備陳於後聖故乃統領大衆至羅伐城中於彼城南而有一河名曰金水爾時羅睺羅多告大衆曰識此水不大衆曰非尊不才尊者曰此河之上近五百里有其至人應住於此衆曰尊何知之師曰吾嘗此水其味在上又見水中而有五影以顯前事而在此相又佛記曰吾滅度後二五百中當有聖者僧迦難提而生羅伐於諸祖中次第十七爾時羅睺羅多說是語已領諸大衆尋水而上便作神力未到食頃而至彼所時彼尊者而入其定羅睺等衆共止一窟候得三七日中方始出定爾時羅睺羅多問僧伽難提曰汝身定耶汝心定耶僧伽難提曰我身心俱定羅睺羅多曰身心俱定何有出入僧伽難提曰雖有出入而不失定相如金在井如金出井在井出井𠀍相去來若約金體都無動靜羅睺羅多曰若金在井若金出井金無動靜何物出井僧伽難提曰言金無動靜何物出井許金出井金非動靜羅睺羅多曰若金在井出者何金若金出井在者何物僧伽難提曰金若出井在者非金金若在井出者非物羅睺羅多曰此義不然僧伽難提曰彼理非著羅睺羅多曰彼義當墯僧伽難提曰彼義已不成羅睺羅多曰彼義不成我義成矣僧伽難提曰我義雖成法非我故羅睺羅多曰我義以成我無我故僧伽難提曰我無我故復成何義羅睺羅多曰我無我故故成汝義僧伽難提曰仁者曾師何尊羅睺羅多曰提婆菩僧伽難提曰稽首提婆尊而出於仁者仁者無我故我欲師仁者羅睺羅多曰我已無我故汝須見我我汝若師我故知我非我我爾時僧伽難提聞師說法心意朗然稽首人者而歸依曰三界一明燈回光而照我十方悉開朗如日虛空住爾時僧伽難提稽首此語已右繞三匝而作是言三界諸苦衆願依師解脫稽首而作禮惟垂哀納我爾時羅睺羅多曰汝心自在非我所繫何依何託皆悉解脫爾時羅睺羅多語已即舉左手於虛空漸漸而長手持金盂用取齊食不起于座而至梵天須之頃却收左手還于本座而現鉢中所有飲食即命諸衆而共同食諸衆至已皆不能食欲擬食之心即猒惡身復戰栗不可近執爾時羅睺羅多告大衆曰吾不讓汝為吾惜食已命汝故悉不得食非我之咎汝自業故說此語已即命僧伽難提而分半座即共食之爾時大衆咸悉驚訝此是弟子云何命座而復共食非其禮也作是念已不敢發言爾時羅睺羅多知其宿命復有他心衆雖不言默然知矣乃告衆曰汝不得食皆由此故今得食者非汝等故過去劫中娑羅王佛而當化度為第十七有大神力多所饒益我滅度後此人度衆如殑伽河沙於摩提國又出一師名伽耶舍多汝等此衆曾為聲聞當第八劫而事羅漢至獲其果到須陀含於彼終後而至吾所雖得近吾猶未見性汝冝回心當禮此尊於我滅後而為上首爾時大衆聞師說已心生疑惑我師神力能取天食彼者非聖何當敬之爾時僧伽難提深知衆意而不敬伏即共尊者議佛在曰𠀍界平正無有埠阜一切江河悉皆潤美樹上甘露露如縣珠食者安樂而無諸衰自佛入寂當近八百𠀍界衰弱人多少信要假神力而為勝負我即不作作亦非難汝即不信信亦不易作是語已用其右手漸漸入地至金剛輪取少甘露却收手已還至會上而現甘露彼衆見已心生敬重師知敬已而用甘露分布一衆命令食之彼既食已身心安樂瞻奉尊者合掌敬禮爾時羅睺羅多曰如來以法眼付囑迦葉迦葉展轉相傳而至於我我今年朽𢒈不久留今將正法付囑於汝爾時僧伽難提聞師付囑心生敬慕而問師曰法有證不有取捨不有有無不有內外不尊者慈造而為解說爾時羅睺羅多以偈答曰於法實無證不取亦不離法非有無相內外云何起爾時僧伽難提聞師說偈歎言善哉大聖者心明如日月一光照𠀍界暗魔無不滅讚尊者已受教奉行爾時羅睺羅多付法已竟即於座上全身入定天衆𢿱花而來供養時當此土前漢第六主武帝十年戊辰之歲入涅槃也第十七祖僧伽難提章辨金河品第二十一爾時僧伽難提者羅伐人也昔居此城南有一大河此河名金水於此河向上而行五百里有二大石窟僧伽難提而處一窟中常樂修禪定此師過去劫而號娑羅王次生此國土而誕𠛴利家名僧伽難提父名寶莊嚴母號芬陀利亦生而解語分明曉了之而為母說法化令入佛道國有一大師善明諸典誥能辨先𠀍事一國悉知聞爾時𠛴利王有詔命師對師至王宮殿當居一寶座王問此太子有何因緣故才生未一嵗而能解言語兼會諸佛義化母而入道師善知往事請為我決烈爾時大師告父王曰今此太子年經七嵗而寤佛道後學禪定而止一窟處于金河當遇聖者而獲道果爾時父王告大師曰今此太子先𠀍之中而居何位大師曰先𠀍之中而處聖位有迎化衆號娑羅王爾時父王思念前事我此太子是吾之寶當捨出家報何薄祐爾時太子已七嵗而白父言稽首大慈父和南骨𮕜母我今欲出家幸願哀慜故爾時父王及其親母聞辭出家至不聽許又苦求父及求其母云不聽出家我與父母情已斷絶爾時父母即聽出家乃命一僧名禪利多請入宮中而與度脫在彼宮內一十九年方命衆僧而為受戒於一靜夜當自念言我名出家元處于舍年二十六曾不近聖即於此夜天有光明是聖感故非其月也忽見一路蕩蕩而直亦無別衆又於面前有一大山太子即尋其路至彼山所須之頃其天似明太子在山處一石窟而習禪定爾時父王至於天明不見太子僧利多而被出諸處追求而悉不獲在彼石室身心安樂而經十年小小衛衆還有三五而近學道爾時僧伽難提於窟而出面北觀望忽見一瑞而喜曰天生聖者不久届此佛大慈故而度脫我即令衛者而淨前窟不久之頃大聖當至汝可速疾而淨道場不久須而至爾時僧伽難提才此語已即入禪定經于二七爾時羅睺羅多游行國土至彼羅伐而見金河回告衆曰識此水不衆曰唯尊能辨羅睺羅多曰此河之上五百里來有一智者而入禪定衆曰師何辨之師曰吾嘗此水其味在上并現其影影有五運當視此相爾時尊者說此語已便作神力須之頃至於彼所時僧伽難提而入其定羅睺羅多衆等共止一室候至二七日中方乃出定尊者相見持論如上佛記僧伽難提吾滅度後二五百年中當有聖者生羅伐城於諸祖中次第十七此二尊者各現神力用發衆意而取天饌共會同食無威德者悉不敢近衆見師命難提尊者分座共食咸悉不敬難提知已即低右手入地徐徐至金剛際而取地味舉衆得食悉皆安樂彼衆見已心即敬伏食甘露已悉得解脫爾時僧伽難提得付法已離彼國土又化他境名曰摩提羅睺記云吾化大衆如殑伽河沙從吾之後於摩提國又出一師伽耶舍多吾與汝等同尋此聖而必知識如是行已教化大衆忽於一日而有微風從西而來尊者面西而候其事乃告大衆汝等衆人識此風不衆曰聖智非惻尊者曰今此風者名曰道風從此西至三千餘里而有聖者欲出現𠀍先淨國土而生其風今此風者不同天風龍風神風鬼風阿修羅風不同諸百風名曰道風亦名淨土風此風和涼不一切雖入大海不作諸浪雖入林木不動枝葉所有疾病遇此風者皆得痊𨓤所有諸業懺不消者遇此風故皆得除滅所有習學心不通者遇此風故心即朗暢而會其理尊者言已即命大衆西尋聖者而化導之即作神通舉衆皆攝未至食頃到一大山山上有蓋如寶落迦尊者曰此是聖所聖亦止此言猶未訖見一俗舍杭於此山除此一家餘無別止是時尊者至彼舍宅云此暫歇坐猶未久忽見一子手執銅鏡而至師所尊者曰子幾歲耶子曰我當百歲是時尊者見答百歲覆而問曰汝當無知看甚幼小答吾百嵗非其理也子曰我不會理正當百嵗尊者曰子善機耶子曰佛偈云若人生百嵗不會諸佛機未若生一日而得決了之時尊者敬之深知是聖又致問曰汝執此鏡意况如何爾時童子以偈答諸佛大圓鏡內外無瑕翳兩人得同見心眼皆相似時彼舍父母見子竒異欲令出家尊者遇之而為度脫父母捨己即領游化至一古寺而為受戒名曰伽耶舍多於彼殿上有一銅鈴被風搖響尊者問子曰彼鈴鳴耶彼銅鳴耶子曰我心鳴也非風銅鈴耳尊者曰非風銅鈴我心誰耳子曰俱寂靜故非三昧耶尊者曰善哉真比丘善會諸佛理善說諸法要善識諸佛義又告曰如來以大法眼付囑迦葉如是展轉乃至於我我今將此正法眼藏付囑於汝汝當護持無令斷絶汝受吾偈當行化之偈曰心地本無生因種從緣起緣種不相妨花果亦復爾爾時伽耶舍多聞師說偈及受法藏心生敬重頂戴受持爾時僧伽難提付法已竟即離本座至樹下立而舉左手把其樹枝尋即化度而歸空寂是時大衆咸作是言今此聖者樹下而終當於後世而必滋茂爾時大衆即𢿱瓔珞塗香粖香燒香供養復共焚𤍽而起塔廟分布舍利咸資大衆衆取舍利欲於平地而起一塔在於樹側衆不能移及諸大衆盡其神力如須彌山不可傾動即就本處而致供養復天花諸梵天衆而雨寶衣用𢿱塔處時當此土前漢第七主昭帝十年辛酉之嵗入涅槃也農新入録
