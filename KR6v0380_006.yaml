body:
  text: 朱陵沙門智炬集三藏辨宗章示化異香品第卅二此章亦名光㻮録一此前魏第一主文章黃初三年壬寅之歲十月中旬建業孫權稱于吳主在位卅一年是時赤烏三年辛亥歲有沙門康僧會至於于上元立第茨設像行道吳主問曰佛法有何靈驗僧會答曰佛有遺骨舍利神應無方有求皆見吳主即令祈請是時僧會至念虔誠不遺其事得于舍利進上吳主是時吳主乃命力士種種試練而光彩璨然都無有損吳主得信遂為塔即今上元建初寺是也所以先立塔廟者為佛法初到凡情久昧若即傳真理取信誠難故先立塔像使修崇有在也自佛入涅槃後經一千七十年至於漢地佛法到後又經一百六十三年至于吳地文章應作文帝第茨應作茅茨二是時有一三藏名竺大力在後漢末第十二主獻帝請翻大品翻經既畢一會七人同遊上苑其三藏是月氏國第草三祖鸖勒尊者弟子忽於苑中見一道白光倏然而滅衆相謂曰此是何相偶是一光瞥然而沒三藏曰今此光者不是別相我鸖勒滅度當于此時衆人聞之已咸共傷動遂聞奏獻帝編于此記云後漢十九年己丑之歲月氏國鸖勒應光示化大品竺大力不出大品契嵩改作本起傳法正宗記卷九宗證略傳二月支國沙門竺大力者蓋第二十三祖鸖勒那之弟子也性素聰悟能通大小乘學其國號為三藏以漢獻帝之世至乎雒邑嘗與沙門康孟詳譯正二本起經一日所館有白光一道忽發於前大力斂容曰此光乃我師鸖勒那入滅之相也衆異之遂以聞帝帝即命志之其時己丑歲也三此三藏從茲遊化至於上元禮覲僧僧會會曰將得佛法來不三藏曰問我作甚沒僧會曰故問凡僧三藏曰汝其聖人會曰我是聖人汝是凡夫三藏曰我是聖人更何用問僧會深知失意歎曰善哉智者當師何尊言論開宗妙知決盡三藏曰我師鸖勒智辨他心暗昧不通無過於我會曰似師辨利當有幾人為自一身別有兄弟三藏曰似我等輩而有三千穎拔出羣名曰師子受師教囑當化北天智惠辨才他心宿命僧僧會會是僧會僧會之連體也以下準之傳法正宗記卷九宗證略傳三尋游江南適值孫權稱王於建康方嚮佛法乃置寺禮沙門康僧會於其國僧會初見大力甚不德之尋用問答遂相推重因曰仁者何師乃能如是大力曰我師鸖勒那故得此妙悟乃通他心僧會曰鸖勒之徒如師利智凡幾何人復有遇之者乎大力曰似我儔三千若其穎達離倫唯一上人耳號師子比丘其人密受正法輿師繼世方揚化於北天竺國四三藏曰我欲見王會即引見吳吳主主問曰朕當化洽合得幾年之歲讖曰清霄喫飯雲間鬪走十四年末逢猪閇逢猪閇口因蠹魚一字不明或是口字傳法正宗記四僧會遂引見於吳主稱道其異吳主乃問力曰孤恭此有土國祚其有幾何力遂說偈答之曰清宵喫飯雲開鬪走十四年末必逢猪口當時權不曉其言而亦甚禮之大力留吳久之及權死其子亮即位益相見問而言皆有效驗五是時吳主悉不知會自爾三藏只在上元五十年間不離長乘寺吳主崩後七年第二主再有請命至殿坐猶未定帝問曰師有聖眼不對曰未得上人法不敢深保帝曰今日西天五土有何氣像師曰今日北天當有難起帝曰天上氣像朕不深知北土難興誰能體悉帝曰欲有近問將代遠疑請師善決以表忠信師曰有疑請問不在試之帝曰今此殿前有一大樹師可見不師曰西國呼為石陀此土名為松樹帝曰此中有物師曰有乖龍帝曰如何驗實師曰旦待須風雨即至帝曰天上無雲如何有雨師曰聖者作用不以為難言論未止有大風雨雷電動作一霹靂樹如粉碎帝即禮拜讚曰神通自在人已得他心智乖龍在於樹其師心便契與師言未盡風雨須臾至乘字字劃不明或敬或樂氣像即是氣象六自後三藏至吳第三主休庚辰之歲却歸西天傳法正宗記卷九六大力尋至孫休之世庚辰歲復還西域七自黃初三年壬寅之歲有中天沙門曇摩迦羅來至許昌觀魏境衆僧全無律儀時有當土名僧光璨問三藏曰西國律儀軌則當何主持示其滅度當有何相莫說昔世師親覩者請為寅白答曰我所見者而有二師一曰摩拏羅二曰鸖勒那此二尊者我悉睹之見於神變不可測量說法化度揔獲聖果傳法正宗記卷九宗證略傳七中印度沙門曇摩迦羅者以魏黃初壬寅之三年至乎許昌初視僧威儀不整頗嘆之謂其不識法律當時許昌有僧曰光㻮者賢於其衆能善遇之乃禮而問迦羅曰師於西國所見何者勝師乃以何法住持幸以見教迦羅曰西土凡有二大勝僧一曰摩拏羅二曰鸖勒那我皆禮遇二大士者皆傳正法以法住持預其衆者寡不莊整然而大士俱得聖道而異德皆不可測八彼摩孥羅臨門神力敵百萬象又復通聖知其昔劫育王之塔所因又當滅度時手指一泉從地涌出并說偈我悉記得光㻮請說偈言偈曰心地清淨泉能潤於一切從地而涌出遍滿十方濟說此已寂然入滅㻮又問曰此師滅來至今多少年代師曰此師滅來五十八白傳法正宗記卷九八摩拏羅者始於那提國以神通力一鼓其腹乃能威伏百萬惡象及其出家教化於西印度於其國辨塔指泉皆有驗效事具其本傳參照傳法正宗記摩拏羅大士傳大士即鰧身太虛呈一十八變返座指地發一神泉復說偈曰心地清淨泉能潤於一切從地而涌出遍濟十方世已而泊然寂滅九又問後師化度如何師曰後師者即前師弟子名曰鸖勒那所作神通非凡所測亦見神變一十八數作聖已入滅大衆欲以火焚各分舍利是時鸖勒見身說偈不許分布其偈曰一法一切法一切一法攝吾身非有無何分一切塔傳法正宗記卷九九鸖勒那乃其繼世之弟子也大興佛事於中天竺國及其寂滅四衆焚之將分去其舍利鸖勒那復能示現說偈誡之不容其分偈亦具其本傳參照傳法正宗記鸖勒那大士傳四衆闍未已將分去其舍利務各塔之大士復現而說偈曰一法一切法一法一切攝吾身非有無何分一切塔衆即合一浮圖而供養之傳燈録第二十三祖鸖勒那章九現十八變而歸寂闍維畢分舍利各欲興塔尊者復現空中而說偈曰一法一切法一切一法攝吾身非有無何分一切塔十此師入滅今一十四年矣又問彼土年代與比不同師曰名字有異時節一也中天竺國冬遇雪以此名之呼為一白北天有多羅樹葉如輪若遇夏其葉如玉取此印之亦名一白西天其葉雕盡名之曰宵亦云一寂南天有諸樹木遇秋如今名之一黃東天樹木遇春如藍亦曰一青共此國中正春不異名號雖異四氣則同就彼五天不失正氣何故此五天竺國世界中心納氣受息悉不失度於彼中有人者多獲長命當報終後不受衆苦為少欲不貪彼我如一光㻮命筆録之編入僧史傳法正宗記卷九十光㻮曰其滅度久耶近乎迦羅曰十二年矣光㻮曰西國歲歷頗與此同乎迦羅曰號謂雖異而氣候不別也遂說五天竺之歷數云云迦葉尋亦西還光㻮亦即傳其事後之為僧傳者得以書之十二年應作十四年迦葉應作迦羅十一此三藏去後又經草八年至齊王嘉平二年春於洛陽更集梵僧重受戒此三藏名曰波羅芬多為衆之首本是龍身為聽中天比丘念聖經云說諸等類耳所聞故當得為人心生恭敬故而獲此報常修梵行為衆所重傳法正宗記卷九十一中天竺沙門婆羅芬多者亦神通不測人也或謂其前身為龍以聽經故得今所生齊王嘉平二年庚午至洛洛僧多從其重受大戒十二復有弟子名摩迦陀當西晉第十一主武帝太始三年丁亥之歲而降雒陽禮覲波羅芬多師問曰汝雖彼國遊諸土得諸傳法道衆平安以不摩迦說曰當問何衆師曰北天汝到不答到我聞師子尊者而被王戮今當後世所繼習者而誰得之答曰自師子尊者滅後至今九白有一罽賓沙門婆舍斯多受尊者并傳一衣復說一偈師子在日即出此罽賓國土今此師者深達法界辨才無礙具六神通及八解脫傳法正宗記卷九宗證略傳十二及晉武太始乙酉之元年會其弟子曰摩迦陀復來芬多因問曰汝在西國頗游北天竺耶或謂師子尊者無辜為其國王所戮是乎今復有傳法者與其相繼耶摩迦陀曰然師子誅死今已二十三白有沙門號婆舍斯多者本罽賓國人先難得其付法授衣即日去之方於中天竺大隆佛事其國王迦勝甚器重之雖外道強辨者皆亦屈伏與王辨其苑中業泉國人異之復號為婆羅多那事具其本傳十三從罽賓國出于南天大作佛事彼國王名迦勝迎此尊者而供養有一外道名無我尊是時王命此外道與婆舍斯多持論爾時外道云解默論不好言說尊者訶曰若不言說爭知勝負外道曰不爭勝負但取其義尊者曰何者多名義外道曰無心為義尊者曰汝既無心安得義乎外道曰我說無心當義非名尊者曰汝說非心當名無義我說非心當義非名所言往返問答如此外道敬伏更不措說正宗記婆舍斯多章十三初至中天竺國其王曰迦勝逆而禮之先是其國有為外道者號無我恃其術頗訾佛法王常不平至此命尊者抑之及會外道者要之默論欲不以言尊者詆之曰若不以言爭辨勝負外道曰不爭勝負但取其義尊者曰何者名義外道曰無心為義尊者曰汝既無心安得義乎外道曰我說無心當名非義尊者曰汝說非心當名無義我說非心常當之誤義非名外道復曰當義非名誰能辨義尊者曰汝當名非義此名何名外道曰為辨非義是無名名尊者曰名既非名義亦非義辨者是誰當辨何物如此凡五十餘反外道詞屈遂伏之無我應作無我尊傳燈録第二十五祖婆舍斯多章十三後適南天至中印度彼國王名迦勝設禮供養時有外道號無我尊先為王禮重嫉祖之至欲與論議幸而勝之以固其事乃於王前謂祖曰我解默論不假言說祖曰孰知勝負曰不爭勝負但取其義祖曰汝以何為義曰無心為義祖曰汝既無心安得義乎曰我說無心當名非義祖曰汝說無心當名非義我說非心當義非名曰當義非名誰能辨義祖曰汝名非義此名何名曰為辨非義是名無名祖曰名既非名義亦非義辨者是誰當辨何物如此往返五十九翻外道杜口信伏于時祖忽然面北合掌長吁曰我師師子尊者今日遇難斯可傷焉十四爾時婆舍斯多當於殿上聞異香氣即起面北合掌作禮大王問曰師禮尊者曰今日我師當已命過深可惜哉深可痛哉是時大王慰喻問訊二字貼紙不可見恐是何物二字傳法正宗記十四時王宮殿俄有異香酷烈尊者肅然曰此吾師謝矣其信適至遂北面作禮十五尊者告王曰我住南而化印度師已滅度何此久留深敬供養當辭之者王曰我有一事欲白尊者宮有一石夜放光明白日如故於此石畔復有一泉常流不絶其水熱如湯我今宮內悉使此湯將充洗浴而不曾歇除尊者固難詳察此是何因而感如此尊者告王曰凡似此者其事有三一者神業二者鬼業三者其地有石石如金色其石如火以因感故亦得其熱此名藥湯亦號自然湯其第二者有人在世不修福德亦不信業廣作諸罪如山不可消盡為無少善不解懺悔命終之後當入惡道餓鬼之中受其業或經一劫二劫三四五劫得方暫出至于人中還作其鬼餘業不盡漸漸償納以溫此水令彼債主而來所用當如此者名曰業水亦曰債湯第一者昔在神中不守本業興波動浪令送錢帛或止古廟廣作殃咎徒祀酒肉神身是業在業作業以此因故無有出離天罰彼衆當還人業以此附水酬答往業為此之故感合如是于時大王即命尊者親察此泉當是何等尊者到泉所才見便識告王曰此者債湯及此石者是於鬼火今將欲滿而故時見大王曰當合如何尊者曰須一爐香當為懺悔王取香爐奉上尊者尊者為懺願罪消滅如此三說于時泉邊忽見一身可長一丈至尊者前作禮歡喜云我有少福得遇尊者而為懺悔得克斯務合生人中不敢便去故來辭耳才此語已瞥然不見尊者告王曰此湯却後七日當自不熱是于鬼火難訓恐是于二字間脫一字傳法正宗記十五尋謂王曰我始去師計往南印土今此久留豈辭師之意遽別王將去王曰尊者少留容有所請余苑中有泉熱不可探其涯之石夜則發光雖甚怪之終不知其然願為決之尊者曰此為湯泉有三緣所致其一神業其二鬼業其三熱石熱石者其色如金其性常炎故其出泉如湯鬼業者謂其鬼方出罪所遊于人間以餘業力煎灼此泉以償其夙債神業者為神不守其道妄作禍福以取嚮祀惡業貫盈冥罰役之亦使煎灼此泉以償濫察王曰幸尊者驗之三緣此果何者而致之尊者曰此神業所致也即命爇香臨泉為其懺悔須瀕水現一長人前禮尊者曰我有微祐得遇尊者即生人中故來辭耳已而遂隱後七日其水果清冷如常泉十六是時尊者即往南天大王即嚴四兵送于出城并賜象輦深奉細妙自此得號波羅多那梵名也此言善別業泉衆傳法正宗記宗證略傳十六時中印之人以其言有效乃以婆羅多那稱之及北天竺聞之復以婆羅多羅稱之然二國之所稱猶此曰別業泉衆也十七時波羅芬多聞弟子說五天識知心自踴躍告摩迦陀曰汝善知悉我亦懸覩深委彼事定不錯謬遂於西晉武帝太始三年書記東京白馬寺因玄朗法師至白馬録得此本編之入集永訣古今之疑定知不誤矣傳法正宗記宗證略傳十七芬多謂其弟子曰我亦知之適驗汝說識有所合當時好事者即書于白馬寺後有沙門號賢朗法師者得于其寺乃傳于世以芬多到中國在齊王之世則當列支疆之前為其始顯於晉太始中故次之也第草五婆舍斯多章焚衣感應品第卅三亦名後魏佛煙三藏五明集十八爾時婆舍斯多者罽賓國人也姓婆羅門父名寂行母號常安樂於夜夢中見一神人手執劍內外明徹斷無瑕穢翳此神人者以手度劍付常安樂云汝善保護勿令有損夢覺即如有孕其身如風常有異香遍滿宅舍時有天花自空而墜十月既滿不覺産度又見手中如執其物復不開展年至十一有一三藏來至其家告其父曰此小童子如斯人者年至草當坐道場獲無上其父問曰此子手中似執一物不知其因三藏曰此所執者非是己物年至草自當還他三藏記已出門不見及年草父夢神人令送此斯多付與師子令翳此手必得平復云云父在前卷不復重録及出家受戒得付法已行化至于中天降伏外道為王辨泉已具前章云云傳法正宗記卷四天竺第二十五祖婆舍斯多尊者傳十八婆舍斯多者罽賓國人也姓婆羅門氏亦號婆羅多羅亦說婆羅多那父曰寂行母曰常安樂初常安樂夢人授之寶劍因孕尊者此後室有異香天數雨花其家及誕拳其左手常若握物至年十一有異僧來其舍謂寂行曰此子年至二十當得大法寶其手所握亦得發明言已僧忽不見及尊者勝冠父寂行攜詣師子尊者辨其宿緣即恣從師子出家因加今名既為沙門而師子方老又其夙纍密邇乃以法付之苦令其去國尊者從命即日去之傳燈録十八第二十五祖婆舍斯多者罽賓國人也姓婆羅門父寂行母常安樂初母夢得神劍因而有孕既誕拳左手遇師子尊者顯發宿因密受心印同録第二十四祖師比丘章尊者既攝五衆名聞遐邇方求法嗣遇一長者引其子問尊者曰此子名斯多當生便拳左手今既長矣而終未能舒願尊者示其宿因尊者覩之即以手接曰可還我珠童子遽開手奉珠祖堂集十八第二十五祖婆舍斯多尊者罽賓國人姓婆羅門父名寂行母號常安樂夜夢神人手執寶劍付常安樂因此有孕滿月産下其子左手常拳似執物從此出家證果得法十九又至于南天化導羣品百千萬衆時南印度王名曰天德即請尊者宮內供養是時彼國有一咒師名曰通靈彼王被惑多取其語縱有善者志不存立見師到已王請供養心生嫉妬多設方計欲損尊者爾時尊心常自安樂不疑懼之時天德大王告尊者曰我有二子常修功德不好財色亦不多語每佛至前覲禮尊像自近一年長臥床不得健好既作多善合得好報以何因緣而招此果時尊者告大王曰今此病者却是功德作之此王子者於後世中必無其罪今世之中不作功德當於此時亦無其病何以故佛云人業惡故常在身心猶如內病藥不相應彼病不出亦不動作直至死後其病即見人業輕故亦在身心猶如霜露遇其好藥眼即病見見盡其病身即安樂何以故身有其業志心懺悔有功其病自見不受後業此太子者亦復如是故佛云於三惡道中若應受業報願得今身償不入惡道受又云衆罪如霜露惠日能消除是故應至心勤懺六根罪王聞是說心生歡喜即與太子廣作利益願病痊可每佛至前恐應改作每至佛前眼即病見意義不通傳法正宗記十九尊者終告往於南天竺王躬羅御仗以送之既至南印其王曰天德者亦逆而禮之初王有子奉佛頗如法為其功德然病且經年王因以問尊者曰吾子奉佛作善而乃得久疾善惡報應將如之何尊者謂王曰王子之疾誠功德之所發也然此理幽遠王其善聽佛謂人有重業在躬猶內病已深藥不能攻將死其病益作病之在淺遇藥即動動而後較重業亦然雖有功德無如之何及其死矣業報益現業之輕也資於功德其報即現後乃清淨今王之子為善久疾必其所為功德發此微業適雖小苦後當永寧經不云乎於三惡道中若應受業報願得今身償不入惡道受王何疑乎王信其說復為營福其疾果愈傳燈録婆舍斯多章十九即辭王南邁達於南天潛隱山谷時彼國王名天德近請供養王有二子一凶暴而色力充盈一柔和而長嬰疾苦祖乃為陳因果王即頓釋所疑二十是時呪師聞王敬於尊者內自設計用以毒藥藥彼尊者當食此藥亦不言說既食已命無所損為藥毒故其氣上升從頂而出化為一蓋覆在頂上可高三尺王見已不知著藥告咒師曰尊者頂上可高三尺猶如其蓋當是何物時咒師即至尊所以手頂上摟攬三二十下却歸本座遺在手地都不覺知為毒藥故非尊所為王見驚訝問咒師曰手在何處咒師曰在此地上心猶不伏即命同徒可近一百俱至王殿恐此尊者多有妖幻恐損於國我欲共鬬令知勝負王敕一任時尊者不起於座頭上藥毒尚未消滅疑如一蓋澄澄不動是時呪師遞相問曰適來手落因何之故其先呪師曰此者頭上有劍我不覺知遂損於生時諸呪師一時向前各說我能有一師手持一木可長七尺就頭上空中㧌撈亦無所礙一時以手空中揮略只著藥氣其手即殞悉不能動是諸咒師心即甘伏不敢索鬪著藥氣者悉皆自死有不著者重來歸依欲求出家尊悉領受咸與度脫遺在手地恐是遺手在地之衍傳法正宗記二十然其國先有呪師曰靈通者王所信重及此乃嫉斯多謀以毒藥中之藥不能害復以術較術益不勝以是深銜之傳燈録二十又有呪術師忌祖之道乃潛置毒藥于飲食中祖知而食之彼返受禍遂投祖而出家祖即與受具草一爾時尊者即出宮苑在於國內遊諸聚落化四部衆經六十年是先大王身已崩化復立一王名曰得勝常崇咒師心不信佛被其咒師於王所說言彼婆舍斯多不會其道亦非師子弟子王若不信請當試之王曰何以試之咒師曰此云聖人問其差事若答不得即非師子繼業弟子爾時大王有一太子名不如密多聞王欲試尊者即諫父王曰今此尊者昔王供養甚是威德不可思議昔有咒師而試尊者當於其時手皆墮落悉不可比願王慈造當勿試之王聞子語切齒訶責不取其諫即囚太子在於宮內不令出入不給供侍每加惡言不自解悔即於一日命其尊尊者者赴命王見尊者亦不命坐當殿誡語而問之曰我國之中無諸邪法師所學法當是何宗尊者曰此國之內無諸邪法我所學者當是佛宗王曰佛滅度來千二百歲師今七十當何得之尊者曰自釋尊傳教歷于草四師我今所學當繼師子尊者王曰師子自身已遭刑戮師有何法囑付於汝當此傳授尊者曰我受其法亦有其信僧伽梨衣見當在此王曰便請此衣我欲覩見爾時尊者則於囊內取僧伽梨衣奉上大王王雖見衣不生信敬即命左右以火焚之使人奉命即執其炬當于殿前再候進旨王曰便當焚爇何更在久是時使臣即便焚爇其火熾盛上下通貫發于時光明貫天祥雲覆地四花亂墮芬馥異香火燼衣存不損如故王見此已心即敬伏即請尊者登于殿上深自發信便請懺悔尊者便為懺悔王所不信願罪消滅如是三說即放太子傳法正宗記草一時尊者去王之宮化於他部已十六年會天德崩後王德勝即位尤好呪者之說呪者因讒之謂其王曰婆舍斯多非師子弟子豈有道耶請王試之王從其言時王太子曰不如密多者知其構惡於尊者乃諍之曰婆舍斯多祖王所重前呪師不能害尋亦自斃其道甚至國家不須試之王怒謂太子黨於斯多遂囚之一日果召尊者御正殿而問之曰我國不容邪法師之所學乃是何宗斯多對曰我所學者佛法之正宗也王曰佛滅已過於千歲而汝安得之尊者曰自釋迦如來傳法更草四世至於吾師師子我適所得蓋承於師子比丘也王曰師子戮死安得以法相傳果爾亦何以為信尊者曰吾師授我傳法僧伽梨在焉即進於王王初不然遂命焚而驗之火方熾遽有異光自其衣而發掩於世火祥雲覆之天香馥郁及燼而僧伽梨如故王大信乃盡禮於尊者其僧伽梨衣王即請之遂詔出其太子及應作火傳燈録草一後六十載太子得勝即位復信外道致難于祖太子不如密多以進諫被囚王遽問祖曰豫國素絶妖訛師所傳者當是何宗祖曰王國昔來實無邪法我所得者即是佛宗王曰佛滅已千二百載師從誰得邪祖曰飲光大士親受佛印展轉至二十四世師子尊者我從彼得王曰豫聞師子比丘不能免於刑戮何能傳法後人祖曰我師難未起時密授我信衣法偈以顯師承王曰其衣何在祖即於囊中出衣示王王命焚之五色相鮮薪盡如故王即追悔致禮師子真嗣既明乃赦太子祖堂集草一行化至中天竺國廣化羣迷次第遊行至南印土有一國王名曰得勝常崇呪師不信佛法呪師奏王婆舍斯多不會佛法請王試之此人云聖問其異事若答不得則非師子繼承弟子大王有一大子名不如密多則向王曰今此尊者先王供養有大威德不用試之王切齒呵責則囚太子王乃命師師則赴命王不令坐當殿試語問曰我國之中無諸邪法師所學者當是何宗師曰此國之內無諸邪法我所學者當是佛宗王曰佛滅度已千二百年師今七十當何得之師曰自釋迦傳教歷於二十四人我今所學當繼師子尊者法亦有信衣名僧伽梨衣現在囊中取呈大王王雖見傳法袈裟心不敬信則命左右以火驗之其火熾然光明貫天祥雲覆地而雨四花異香氣馥火燼衣存王覩斯瑞方乃發心求哀懺悔此衣在於王宮起塔供養婆舍斯多濟儲見乳章辨瑞日月品第卅四草二爾時王子在於宮內身被囚褻亦不得食作是思惟我為佛故而被囚褻今我飢渴如何存濟作是語已于時有一道白乳從空來入於口中如甘露味食此乳已身心明朗身輕健無復燥悶而自安樂又言我雖快樂不樂宮殿若出于此便即出家語已使至宣王詔命令放太子于時太子出謝父王又啓王曰身有疾病不任繼嗣欲近道者而求出家王不留難告曰願汝善勤莫退其志且證道果不退菩提爾時密多謝王已即辭出家王任汝去太子即往師所頭面禮敬而白尊者曰故來禮侍欲求出家尊者問曰父王聽不密多曰我已咨白悉不留難任我出家命至師所師曰汝欲出家當為何事密多曰我所出家不為其事師曰汝云不不為為何事密多曰我所不為為為俗事師曰不為俗事當為何事密多曰當為佛事尊者念言當是如來以大悲力令此太子助作佛事太子在師左右六年所言皆異尊者就王宮與出家兼請賢衆與之受戒是太子當受戒已其地振動白日月見衆會悉覩汝云不不為為何事是汝云不為不為何事之略體傳法正宗記草二初不如密多被囚左右不得以時進膳饑渴之甚方慮死在旦夕俄有白乳一道自空而來注其口中味若甘露形神即寧因有所感竊自謂曰我若脫此當求出家少頃而赦命至太子見王謝已遂稱疾請免儲副乞從出家王詳其志不可奪許之太子即詣尊者致弟子禮尊者曰父王聽乎曰俞又曰汝欲出家當為何事曰我為佛事尊者以其懇至尋為度之當此地動月於晝現舉國皆驚傳燈録草二太子遂求出家祖問太子曰汝欲出家當為何事曰我若出家不為其事祖曰不為何事曰不為俗事祖曰當為何事曰當為佛事祖曰太子智慧天至必諸聖降迹即許出家六年侍奉後於王宮受具羯磨之際大地振動頗多靈異祖當集草二時太子被囚深宮并不得食乃云我為法故今此飢渴如何存濟其時天降白乳入口味如甘露食了輕健乃作是言我若出宮則便出家王詔出宮投師出家師云汝欲出家當為何事太子曰我所出家不為其事師曰汝言不為不為何事太子曰我所不為不為俗事師曰不為俗事當為何事太子曰不為俗事當為佛事師自念言如來以大悲力令此太子助作佛事在師左右出家具戒草三王見此月并又地動告尊者曰今此疑瑞有似非好尊曰今此祥瑞是善利王曰我問白日月見陰陽相逆夜中見日亦復如是尊曰白日見月得遇聖者夜中見日暗者皆明王聞師解心即歡喜又問尊曰我自此來心有五疑今遇尊者心應決了常見世界有地振動有不動處有時遠振不知其際今日地動是何所作及遍不遍亦復如是又疑天上日月星宿當有何感時隱時見下有識者悉知其事有不知者如我無異及彼之者時會不會又疑地上所感生于異物將應何事用表何人雲虹氣象悉從地起有何等人當感此事又疑東西二際有其霞彩色種不等朝有暮有時散時聚又疑其天淨無雲時其色青紺以何感故當獲如是我願尊者心如大海不異小流雖說佛法亦說世法而此前事非因尊者難可知解尊者白大王曰千世界即是佛界百億如日月亦復如是豈會佛法不說世法若作是解無有是處此五事者何以故今者地動及諸異瑞日月星像悉有由矣世有諸佛出見地四振動白日見月夜見於日世有諸佛成菩提道地五振動日月光明世有諸佛涅槃地六振動日月暗昧世有菩薩出見地三振動白日月見世有菩薩成道地四振動夜中見日世有菩薩滅度地五振動天上明星皆悉暗昧世有羅漢出見地二振動白日星見世有羅漢證果地三振動夜星衆明世有羅漢寂滅地四振動夜星不明世有比丘學佛道不退堅志一生二生亦出見世地一振動此佛道比丘欲證果地二振動此佛道比丘欲遷化時地三振動若有比丘學菩薩道不退堅志一生二生至於三生出見於世地半振動此學菩薩比丘若證於果地一振動此學菩薩道比丘若滅度時地二振動若有比丘學羅漢道不退堅志一生乃至四生等出見於世感其星明此比丘當證果時地半振動此比丘入滅時地一振動於世界中有一衆生至孝至順者地半振動於世界中有一衆生犯五逆者地半振動如地振動而有八等其事皆爾又東西有霞者為須彌山東西二面黃金諸各見其氣為日光所照雜氣見當日盛時此氣不見日此氣出見即遙遠此聚散者日行三道各不同時春夏秋等亦復如是又此天如紺色者為須彌山南面所嚴飾處是吠璃琉所作以應故常作青色也此天上祥瑞而有三等人中祥瑞及地亦各有三而此祥瑞各見不同故如是說大王問曰天上三者何尊者曰感日上上祥瑞感月上中祥瑞感星上下祥瑞日月星等悉在于上隨所感衆呼為上中下感日者是佛世尊最為其上以感於日名為上上祥瑞感月者皆是菩薩羅漢中果之聖感感其月故名為上中祥瑞感星者皆是下界名賢感於上象名為上下祥瑞從地所起而無根株如此祥瑞亦有三等地生虹名上上祥瑞地生雲其雲五色名為上中祥瑞地生於氣氣如蓋名上下祥瑞又於人中而有三等若感於君上上祥瑞感於臣上中祥瑞感於人上下祥瑞又禽獸之中而有九等悉皆不同何以故其弟子一者比而未有忽而有者又非雌物其形妙妙身如銀色此名上上祥瑞又禽獸之中以有形者不是雌物本非白而忽自白師子龍龜等并為上中祥瑞又於禽獸之中最精妙者本非有角忽如自有者并為上下祥瑞又於禽獸之中本非有翅忽而有并白色者名中上祥瑞又於禽獸中本非有鱗者忽爾生鱗并變白者名中中祥瑞又於禽獸中非紫者忽而變紫名為下上祥瑞又於禽獸中本非青色黃色不是雌者名下下中祥瑞又於禽獸中本非黑者忽爾變黑不論雌雄名下下祥瑞又於草木之中而有九等又草木之中本自堅貞更加異瑞本非白者忽而自白此名上之瑞又於草木中比少有者其心堅實復加紫者名上中祥瑞又於草木中本非有葉忽爾自有者名上下瑞又於草木中本非有子果如有得結實者名中上瑞又於草木中相擁生者名中中瑞又於草木本非有花者忽爾著花花色紫者名中下瑞又於草木中本非人形忽作人形者聖名下上瑞又於草木中本非有光忽而有者名下中瑞又於草木中本非禽獸形者忽作獸形者名下下瑞爾時尊者告大王曰若於三千大千世界如此祥瑞無量無邊不可窮極且數此世界略舉少多王曰若非尊者誰能辨此祥瑞我今有福當遇尊者得聞此事深達其意即於座前作禮百億如日月恐是如百億日月不退堅恐脫堅下志字口五逆因蠹魚一字不明契嵩作作今訓犯字相口生因蠹魚一字不明契嵩作接今訓擁字傳法正宗記草三王恐其不祥尊者告曰此非不祥勿憂也王曰吾聞月晝出日夜現此陰陽相反安得祥乎尊者曰晝而見月表遇聖人夜而覩日表大暗皆明王憂遽解因謂尊者曰我亦夙有五疑今遇尊者聖智敢以問之一者往見地動或近或遠由何所致今日復爾同不同耶二者日月星宿何故隱現不時三者地産異物其應誰乎雲霓佳氣自地而作何人惑召四者東西極望霞彩不定倏明倏滅與其五者天色青紺其孰使然尊者無專佛法而不言世諦願為決之尊者曰三千大千百億日月皆佛境界而孰不可談豈有佛法世諦說不說耶王無為是語然王之所疑皆有以也君其聽之世有佛出地則四震晝則現月夜則現日世有佛成道地則五震日月增明世有佛涅槃地六震日月皆晦世有菩薩出者地則三震晝則現月世有菩薩成道地則四震夜則現日世有菩薩滅度地則五震天之明星皆即曖昧世有羅漢出者地則一震晝則星現世有羅漢證果地則三震夜星皆明世有羅漢寂滅地則四震衣星皆晦世有比丘二生不退學佛之道及其出世也地則一震若是比丘將證聖果地則二震若是比丘遷謝之時地則三震世有比丘三生不退學菩薩之道及其出世也地則半震此學比丘將證聖果地則一震此學比丘欲寂滅時地則二震世有比丘四生不退學羅漢道者及其出世也衆星皆明此學比丘將證聖果地則半震此學比丘將入滅時地則一震世有人為至孝者地則半震世有人作五逆者地亦半震是八者功德有大小而業有善惡隨其所感故地動有遠近日月隱顯東西霞氣不定其色者蓋須彌山之東西二面隨曰蔽虧故衆寶之色明滅不一天色紺青者亦須彌山之南面以吠琉璃所成及其晴映故有是色夫天地人三者之瑞各有上中下三品其應現不同王曰夫三品者何尊者曰感曰上上瑞惑月上中瑞感星上下瑞感其上上瑞者唯佛大聖人能之感其上中瑞者唯菩薩其次聖人能之惑其上下瑞者唯阿羅漢又其次聖人能之雲氣虹霓起於地者亦有上中下之三品也虹霓之氣上上瑞也唯君有道故能感之景雲五色上中瑞也唯人有善乃能感之禽獸之瑞亦有九品夫物有罕見於世而忽有之形非雌牝色如璧玉若鱗龍之類者此上上瑞也物有本非白色而忽雪如若龜師子之類者此上中瑞也物有本非角者而忽角之色復如金此上下瑞也物有本非翼者而忽翼之色復如銀此中上瑞也物有本非鱗者而忽鱗之色復皎如此中中瑞也其中下一說元古本脫落物有本色非紫者而忽紫之此下上瑞也物有其色非青非黃復不雌牝此下中瑞也物有本色非黑而忽緇之不必雌雄此下下瑞也草木之瑞亦有九品夫草木有本性堅正而益其秀異本色非色而忽皎如此上上瑞也草本有性稍堅正本色非紫而忽紫之此上中瑞也草木有本非標秀而忽秀之此上下瑞也草木有花而不實而忽實之此中上瑞也草木以異本相接而生者此中中瑞也草木有忽變而生異花者此中下瑞也草木有忽生人之象似者此下上瑞也草木有忽發光者此下中瑞也草木有忽生飛走之象者此下下瑞也夫釋迦佛化境若此祥瑞者無限殆不可紀然皆隨世福力大小感召而出之王得其異聞前而加禮與其二字恐錯簡草四時尊告王曰今此太子定是菩薩當感月見得地振動以感乳故深免渴乏終是聖人當合繼我爾時太子不如密多出家已畢并復受戒不起于座得三昧果身心清淨獲他心智尊者即歸本所化度無量乃告不如密多曰吾今年邁欲入涅槃重持此法付囑於汝又曰今此法者是如來正法眼藏傳大迦葉如是展轉乃至於我我將此法特付於汝汝受吾教聽吾偈言聖人說知見當境無非是我今悟真性無道亦無理不如密多歡喜受教而又告師曰今此僧伽梨衣在於王宮起塔供養師不傳我當由何以尊者告曰我所受衣為此難故汝前無難當何用衣後世禪法遍于十方所在國土無不遵仰汝善行化當自保護爾時不如密多禮辭尊者心壞踴躍當自慶幸而順教詔尊者付法既竟即從座起湧身虛空作十八變放大光明照耀天地用三昧火以自焚身所有舍利從空散下不至於地於其地面可高一尺是時大衆悉皆驚訝云此尊者神力無比爾時大王聞師滅度即嚴四兵廣飾象輩以諸妙共莊一蓋價直千萬持至會所奉上尊者用嚴舍利當此東晉第一主元帝八年乙酉之歲矣心壞恐心懷之衍湧身恐應作踴身元帝八年乙酉傳燈改作明帝太寧三年乙酉傳法正宗記草四尊者謂王曰王子出家其所感若是誠大士也宜其繼我紹隆法寶不如密多尋亦證果即與密多還其前之化所其後乃命曰吾老甚非久謝世昔如來大法眼藏今以付汝聽吾偈曰聖人說知見當境無是非我今悟其性無道亦無理密多既受付法復告斯多曰尊者以祖師僧伽梨衣祕於王宮不蒙授之其何謂耶斯多曰我昔傳衣蓋先師遇難付法不顯用為今之信驗汝適嗣我五天皆知何用衣為但勤化導汝之已後者度人無量密多默然奉命已而尊者超身太虛作一十八變大放光明照耀天地即於空中化火自焚雖雨舍利而不墜于地大衆各以衣祴接之尋建浮圖合而祕之其時當此東晉明帝之世也其性應作真性傳燈録草四祖乃命之曰吾已衰朽安可久留汝當善護正法眼普濟羣有聽吾偈曰聖人說知見當境無是非我今悟真性無道亦無理不如密多聞偈再啓祖曰法衣宜可傳授祖曰此衣為難故假以為證明汝身無難何假其化化被十方人自信向不如密多聞語作禮而退祖現于神變化三昧火自焚平地舍利可高一尺得勝王創浮圖而祕之當東晉明帝太寧三年乙酉歲也祖堂集草四便證道果乃命付法而說偈曰聖人說知見當境無非是我今悟真性無道亦無理此師入滅時當此土東晉第一主元帝八年乙酉歲矣淨修禪師讚曰婆舍斯多久離攀緣未逢作者終不開拳傳師衣鉢度物橋船當心妙見豈假言宣第草六祖不如密多章辨毒龍地品第卅五草五爾時不如密多者南印度國王之太子也王名得勝彼此太子欲誕之時天香滿殿散遍空際宮諸眷屬悉皆愛仰其心調柔意多善順不起三業常好法教每於宮內常修梵行爾時婆舍斯多至彼國土為王所敬而彼國中有一外道名無我尊不信佛法云已具前文不復重録傳法正宗記卷第五天竺第二十六祖不如密多尊者傳草五不如密多尊者南天竺國人也姓剎帝利父曰得勝即其國之王密多蓋得勝之太子也誕時宮中有異香氤氳家人奇之然其天性淳懿少崇佛事初婆舍斯多道化其國尊者會事因稱疾乞免太子從斯多出家王聽斯多即宮中為其剃度會勝僧受之具戒事見於斯多傳傳燈録第二十六祖不如密多章草五第二十六祖不如密多者南印度得勝王之太子也祖堂集草五第二十六祖不如密多尊者南印土國王太子正名得勝具如寶林傳也草六爾時不如密多得付法已次第行化至東印度國王名曰堅固姓剎利迦常敬長爪外道爾時此王欲移本城向東面五十里來王登高樓命長爪外道令向東望近五十里甚好氣象外道見此亦不知是好是惡而隨王語亦云甚好外道曰此地境異宜可安城甚是滋茂常有紫氣蓋覆若是惡處必無此瑞又南望見一大山去此城邑可近百里又告長爪曰此山之中應有異物上有氣可高千尺于時長爪有一弟子在外先見不如密多入此東印度界密來報長爪云此尊者有福德善說佛法多諸機辨恐至王處王便宗敬損滅我徒大仙有便勿令王敬特疾來報當望速計長爪開已後共王登樓命王西望不見一物王問曰西方有何物長爪曰西有魔至行李可畏王問如有魔至當合如何長爪曰若有此魔國即衰喪王曰當有何計長爪曰宜便誅戮王曰凡欲誅戮當須有過若未有過難可形害長爪聞語已辭王下樓歸其本所命同徒者令各在意有一瞿曇弟子不久即至王必歸敬我等諸人恐被損滅如有智者宜說方計衆中有長爪告大仙曰我自有法當共𩰚之彼若不得自王不敬何用憂慮長爪告法者曰所解法者其有幾人法者曰似我等者面有一百次於我者有三百人長爪又門法名云何法者曰我法咒天咒地悉得振動入火入水不被燒溺長爪喜曰仙法行皆由法尊法者又曰我法一化直得驚忙非假大法不消小術長爪即往白王此魔若來請王不憂我自有法對王調伏王曰來須𩰚敵莫宜排㧙不得疏慢是時長爪五百餘人銜牙頓齒唯待尊者尊於時該諸大衆欲入此城到門外告衆人曰小諸又識此氣不衆曰非尊不才尊者告曰此城之中欲起少難而隔於我隔即不得當自損之若損人衆近滿五百語已入城見王王問曰師所來者其意云何尊者曰我所來者當度衆生王曰以何等法而度衆生尊者曰剛強衆生剛強化柔耎衆生柔耎調王曰若有善術師何以敵尊者曰若會佛法一切天魔上自消伏小小善術之類斯不足言不假神通而自調伏于時長爪道衆悉在此會聞尊者語已便設法術密作禁呪化出一山可高千尺不著於地在於空中當尊者頭上尊者知是術法即以手二指按地彼五百衆各見其身在嶮而立不復敢動所化之山却在彼衆頭上可去一尺危危欲墮彼長爪衆一時乞命尊者即以左手却黜其地悉復依舊諸長爪衆一時作禮云我等輩不識賢聖當願并哀敏我等王即禮敬云我凡眼不識尊者令彼小螢而對金尊者即為王說法王即悟解深自悔責長爪之衆一時退散各相謂曰尊者神通如此我爭比之開應作聞非尊不才才恐識字略體傳法正宗記草六尋從斯多出宮乃得付法其後遊化至東天竺國先是其國王剎帝堅固信重長爪外道梵志者及尊者入境外道之徒患之以告其師曰適知不如密多入國其人道勝恐吾黨不如宜先謀斥之外道即請從其王登高因西望謂王曰西有妖氣必魔入境王見之乎王曰不見然則奈之何外道曰此魔所至家國必衰然為王計者不如誅之王曰未見其罪豈忍為乎外道復進其徒之善咒者曰其法能動天地此可以禦魔然尊者已知託以望氣先戒其衆曰我至此城必有小難汝輩勿驚及見王果詰曰師來何為尊者曰我來欲度衆生曰當以何法度何類衆生曰隨其類而以法度之曰苟有術者師敢敵乎曰我佛法至正雖天魔不足降之安有妖術而不敢當耶外道輩聞其語益憤作法即化一大山凝空將壓尊者尊者遂以指按地地動五百外道皆不能立移山即臨其首外道黨大懼尊者復按地地靜化山亦沒外道皆羅禮悔過王亦謝之曰不識大士乃令螢火欲爭曜日月傳燈録草六既受度得法至東印度彼王名堅固奉外道師長爪梵志暨尊者將至王與梵志同覩白氣貫於上下王曰斯何瑞也梵志預知尊入境恐王遷善乃曰此是魔來之兆耳何瑞之有即鳩諸徒衆議曰不如密多將入都城誰能挫之弟子曰我等各有咒術可以動天地入水火何患哉尊者至先見宮牆有黑氣乃曰小難耳直詣王所王曰師來何為尊者曰將度衆生曰以何法度尊者曰各以其類度之時梵志聞言不勝其怒即以幻法化大山於尊者頂上尊者指之忽在彼衆頭上梵志等怖懼投尊者尊者愍其愚惑再指之化山隨滅乃為王演說法要俾趣真乘草七時堅固王於新遷城所致一大供設彼長爪五百人意恐悵怏故悅預之并迓尊者同赴此會尊者不受其請王有怩意尊已遙知又自念曰我是如來弟子具大慈故若不救命何名沙門即於座上作少神通往至會所王見尊者而便問曰適請不來當復還至尊者曰我念汝一衆須臾陷溺我若不來當誰救汝舉衆聞言皆悉驚訝遞牙相問云是何事王催齊食令速持辨尊者曰今此一會非得此會王曰何以尊者曰此是龍地須即陷汝等若信便隨吾起于時一會并王部從一千二百揔遂師起離此會所向一高處相去五里回面未正其地即陷不損一人而脫彼難王深敬重以二象輦七嚴飾細妙好者而載尊者邐迤話言往故城所前妙音聲及諸伎樂四兵如雲漸漸歸止王曰五日向前作一大夢今日有此便應前瑞其事甚妙孰能先覺自非尊者而不造此尊者曰佛具大慈悲我當亦合爾心不彼我者損已又大王曰我所夢者見一金鎖從空而垂我以手執光照一衆良久收上亦不落地今尊者救我等事與此無異尊者復告王曰我於路上未至此國亦作此一夢夢見一子手執珠蓋隨我後行亦不退步我觀王國當出一人以繼於我王曰今此小國不生大賢縱有其人不繼於聖尊者曰彼濁泥中尚出青蓮豈況勝國而無賢者遞牙即遞互齊食即齊食龍地恐龍池之衍遂師恐逐師之衍傳法正宗記草七是時王新遷其都他日張大齊落之亦以慰外道欲尊者預會尊者初不奉命徐觀其地將陷即以神通往之王曰師果來耶曰我非應供來欲有所救耳王曰何救曰此地已為龍之所有須臾當陷衆不便去必溺王恐即起其衆去之未遠至一高原反顧其地果陷淵然成湫王益敬密多即嚴象駕命尊者偕還其故城因曰余五日之前嘗夢中墜一金鎖垂至於地我即舉之今日之事非其應乎尊者亦謂王曰吾昔將至此國嘗夢一奇童持寶蓋趨我之後此必聖人出王所治以相繼傳法王曰下國豈有至人耶曰王無謙是必應之草八是時彼國有婆羅門家生得一子年近草父母俱喪亦少親族常自求乞隨時而已有命使者亦不辭苦當行即行意住即住或念佛語或唱三昧意無所執亦不於放逸或居肆或止村落曾處至陷處有識詞曰神人腳踏土會裏逢龍虎是日取王來王便隨他去出此讖已自隨所之不定居止又問曰汝行何急童子曰汝行何慢人問姓何答與汝同姓或凡或聖皆不能測此童子口稱瓔珞即往城東而迎尊尊者者爾時與王徐徐進輦尊者告大王曰此國聖者不久出見王曰作何形狀尊者曰人不可識王曰早晚見尊者曰即至言論之次是瓔珞童子至於輦前頭面作禮師告王曰此者是也王於輦中小禮合掌尊者告童子曰汝憶前世事不瓔珞曰我憶前世當與尊者在法會中而說般若我在會上轉修多羅為化緣故特此相候尊者告大王曰今此菩薩王當識不王曰我難覩見心且不識師曰欲識此童子者不是別聖是大勢至菩薩又曰吾今不憂於此聖後當出二人一人當住此國土盡皆化導一人化導南天度衆無邊悉獲善利得果之衆近有三千獲小乘禪而當一万後化導六十年已更往東方至震旦中居一九不辭苦苦字字劃不明或告或去取字契嵩作趣一万恐一方之衍傳法正宗記草八先是其國有婆門子幼無父母孑然放達自號瓔珞閭里不能測其為人一日遽發隱語曰神人腳踏土會裏逢龍虎是日趣王來王便隨他去自是出處益不常及王與尊者駕至其舊城之東此子特來迎之禮於駕前尊者語王曰所謂王國之聖士此其人也尊者即謂瓔珞曰汝記往事乎瓔珞曰我念昔同法會尊者演摩訶般若波羅蜜而我轉甚深修多羅緣當復會故此相候密多謂王曰此子蓋大勢至菩薩降迹為吾嗣法然其後復出二大士其一先化南天竺而後緣在震旦然其九年即返本國傳燈録草八又謂王曰此國當有聖人而繼於我是時有婆羅門子年二十許幼失父母不知名氏或自言瓔珞故人謂之瓔珞童子遊行閭里丐求度日若常不輕之類人問汝行何急即答云汝行何慢或問何姓乃曰與汝同姓莫知其故尊者又謂王曰此童子非他即大勢至菩薩是也此聖之後復出二人一人化南印度一人緣在震旦四五年內却返此方遂以昔因故名般若多羅草九爾時大王告尊者曰若擬與此童子出家受戒我願供給所須當欲求福是時尊者與王到城即度童子出家受戒尊者告瓔珞曰汝憶前世我說般若汝契多羅可以此號稱之名為般若多羅瓔珞欣慶依師改名即從會起見三昧光而照一衆所見光者咸得安樂心不燥悶身形光澤行步輕健傳法正宗記草九尊者即為之剃度謂瓔珞曰以前吾談般若汝說修多羅致今復會便宜以般若多羅為汝之名傳燈録草九後王與尊者同車而出見瓔珞童子稽首於前尊者曰汝憶往事否曰我念遠劫中與師同居師演摩訶般若我轉甚深修多羅今日之事蓋契昔因三十爾時不如密多在東印度六十餘年化度無量化緣漸畢乃告般若多羅曰如來以大眼法付囑伽葉轉次至我我今授汝宜當護持勿令斷絶聽吾偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智於時般若多羅受教奉持尊者何法既竟即入王宮而告王曰我受王施當不輕利度人已畢佛事亦竟願王好住我入涅槃王即悲泣聖何速哉且願住世尊者曰時當行矣更不久言却歸本座化身如日良久不滅王施金塔以盛舍利尊者見日相已騰身空中作十八變訖化火三昧自焚其身所下舍利皆如金色玉收供養時當此土東晉第九主武帝戊子之歲矣傳法正宗記三十當此不如密多化道於東天竺逾六十年矣一旦遂命般若多羅而告曰昔如來付大法眼藏展轉至我我今用傳於汝汝宜流通勿令其絶聽吾偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智付法已尊者告王曰荷國惠施寧不感之但其化緣殆盡不能久戀仁德吾將往矣王善保之王泣下如喪所親尊者乃於王宮即座化形如日少頃復之呈一十八變以三昧火即自焚之雨金色舍利王後為金塔以閟之其時當此東晉孝武帝之世也傳燈録三十付法藏偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智尊者付法已即辭王曰吾化緣已終當歸寂滅願王於最上乘無忘外護即還本坐跏趺而逝化火自焚王收舍利塔而瘞之當東晉孝武帝太元十三年戊子歲也祖堂集三十爾時不如密多告般若多羅曰我持此法用付於汝汝善護持勿令斷絶而聽吾偈言真性心地藏無頭亦無尾應緣而化物方便呼為智此師入滅時當此土東晉第九主孝武帝戊子歲矣淨修禪師讚曰不如密多勝王誕慶高遠宮嬪逈惇道行佛法棟梁王臣瞻敬洞鑒媸妍祖堂金鏡參考淨修禪師讚曰般若波羅幼名瓔珞父母淪亡東西盤泊一曉龜毛恆嗟水涸果滿菩提道源遼廓此傳原刻十卷缺六七九十四卷今僅據日本昭和八年東方學報第四期所載常盤大定發現第六卷補入秦新編入録
